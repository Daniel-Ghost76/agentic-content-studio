warmap_tabs: {data: Data, dashboard: Dashboard 2.0}
user_google_email: daniel@ministryflow.co
timezone: Europe/London

year_goals:
  - 50 paying clients by end of 2026
  - First 10k/mo
  - YouTube → Skool → AI implementation services engine running

month:
  id: 2026-06
  objectives:
    - Outreach system v1 fires its first automated DM batch (end-to-end, before June 30)
    - YouTube pipeline shipping 2 videos/week
    - Skool funnel ready to receive (offer + onboarding live)
  quotas:
    videos_per_week: 2
    posts_per_day: 0          # short-form deferred until video + outreach are consistent
  north_star: 1 video/day once editing is fully automated (Codex + Claude Code) — not yet

priority_ranking:
  - outreach_system_build    # building the automated DM machine (NOT manual DMs)
  - youtube_pipeline         # next stage action for the active project(s)
  - skool_funnel             # offer + onboarding
  - distribution             # deferred — no short-form for now
  - admin

time_rules:
  day_start: "03:45"              # brush teeth + water (15 min)
  deep_work: "04:00-09:30"        # creative + build; no sends, no admin
  outreach_sends_after: "13:00"   # US avatar awake
  clock_out: "18:30"             # work ends; 18:30–19:45 = wind-down / read Kindle
  fill_rule: "EVERY 30-min slot 04:00–18:00 must be a WORK slot assigned to a priority (tile p1..p4 by ranking, no bare gaps). No meals are ever scheduled — eating is ad-hoc, that time is work."
calendar_rules:
  authority: "FULL — owns the solo calendar. Each day wipes deletable events and rebuilds, EXCEPT protected ones (see below)."
  never_delete:
    - "MEETINGS: any event with an attendee other than daniel@ministryflow.co"
    - "PROTECTED: any event whose title contains a protect_keyword (a human commitment typed as a plain event, e.g. 'Call with Ana')"
  deletable: "everything else solo — ⚔️ work blocks and the named routine anchors — these get wiped and rebuilt"
  delete_mode: "single-instance only (recurring SERIES never cancelled — only that day's instance is replaced)"
  audit: "every deleted event logged to Planning/logs/calendar-audit-<date>.json BEFORE deletion (restore trail)"
  protect_keywords: [call, meet, meeting, appt, appointment, interview, sync, "1:1",
    podcast, session, with, doctor, dentist, dr., birthday, anniversary, flight,
    travel, trip, pickup, "pick up", "drop off", dropoff, viewing, visit, lunch with,
    coffee, dinner with, hangout, date]
  conflicts_go_to: "conflicts array of the day JSON"

# canonical daily routine — rebuilt every day around meetings. NO MEALS (eating is ad-hoc).
# All routine items render purple (non-counting). Everything else is work.
routine:
  - {name: "Brush teeth + water", time: "03:45", mins: 15, days: all}
  - {name: "Shower", time: "09:30", mins: 30, days: [Mon, Tue, Thu, Fri]}   # always 30 min before gym
  - {name: "Gym", time: "10:00", mins: 90, days: [Mon, Tue, Thu, Fri]}
  - {name: "Wind-down — Read Kindle", time: "18:30", mins: 75, days: all}   # clock out 18:30 → 19:45
  - {name: "Sleep", time: "19:45", mins: 480, days: all}
  - {name: "Church", time: "16:00", mins: 120, days: [Sat]}

non_negotiables:
  - No sugar, no eating outside the meal plan
  - No YouTube / Hormozi / courses / random research
  - No distractions 4–8am — do not NOT work on the priority
  - No task switching / incompletion (90%+)
