<!DOCTYPE html>
<html
  data-composition-variables='[
    {"id":"number","type":"string","label":"Number","default":"4.2"},
    {"id":"unit","type":"string","label":"Unit (optional)","default":"k"},
    {"id":"prefix","type":"string","label":"Prefix (optional)","default":"$"},
    {"id":"label","type":"string","label":"Label","default":"revenue per video"},
    {"id":"position","type":"enum","label":"Position","default":"bottom-right","options":[
      {"value":"bottom-right","label":"Bottom Right"},
      {"value":"bottom-left","label":"Bottom Left"},
      {"value":"top-right","label":"Top Right"}
    ]},
    {"id":"hold_ms","type":"number","label":"Hold Duration ms","default":2000},
    {"id":"count_up","type":"boolean","label":"Count Up Animation","default":true}
  ]'
>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      background: #09090b;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    /* Hero-frame end state */
    .stat-card {
      position: absolute;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 20px 24px;
      min-width: 300px;
      max-width: 440px;

      /* Glass recipe — footage overlay variant */
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.40),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .stat-card.bottom-right { bottom: 160px; right: 160px; }
    .stat-card.bottom-left  { bottom: 160px; left: 160px; }
    .stat-card.top-right    { top: 160px; right: 160px; }

    .stat-number {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .stat-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #a1a1aa;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div
    data-composition-id="stat-metric-card"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="3.5"
    data-track-index="0"
  >
    <!-- Hero-frame end state: card fully visible at bottom-right -->
    <div class="stat-card bottom-left" id="card">
      <span class="stat-number" id="stat-number">87%</span>
      <span class="stat-label" id="stat-label">accuracy rate</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const vars = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables()
        : { number: '87', unit: '%', prefix: '', label: 'accuracy rate', position: 'bottom-right', hold_ms: 2000, count_up: true };

      const targetNum   = parseFloat(vars.number) || 0;
      const unit        = vars.unit   || '';
      const prefix      = vars.prefix || '';
      const isDecimal   = String(vars.number).includes('.');
      const countUp     = vars.count_up !== false;
      const holdSeconds = Math.max(0.5, (vars.hold_ms || 2000) / 1000);

      const numEl   = document.getElementById('stat-number');
      const labelEl = document.getElementById('stat-label');
      const card    = document.getElementById('card');

      // Apply label
      labelEl.textContent = vars.label;

      // Apply position
      card.className = 'stat-card ' + (vars.position || 'bottom-right');

      // Initialise number display
      numEl.textContent = prefix + (countUp ? '0' : targetNum) + unit;

      // Timing
      const entranceStart = 0.1;
      const entranceDur   = 0.3;
      const countStart    = entranceStart + entranceDur;       // 0.4s
      const countDur      = countUp ? 0.6 : 0.15;
      const holdStart     = countStart + countDur;              // 1.0s
      const exitAt        = holdStart + holdSeconds;            // 3.0s
      const totalDur      = exitAt + 0.3;

      document.querySelector('[data-composition-id="stat-metric-card"]')
        .setAttribute('data-duration', totalDur.toFixed(2));

      const tl = gsap.timeline({ paused: true });

      // Panel entrance — slide up from below
      tl.from('#card', {
        y: 12,
        opacity: 0,
        duration: entranceDur,
        ease: 'power3.out'
      }, entranceStart);

      if (countUp) {
        // Counter animation via GSAP tween on a proxy object
        const counter = { value: 0 };
        tl.to(counter, {
          value: targetNum,
          duration: countDur,
          ease: 'power3.out',
          onUpdate() {
            const v = isDecimal
              ? counter.value.toFixed(1)
              : Math.round(counter.value);
            numEl.textContent = prefix + v + unit;
          }
        }, countStart);
      } else {
        // Slam-in pulse: number already set, animate scale
        tl.from('#stat-number', {
          scale: 1.05,
          opacity: 0,
          duration: countDur,
          ease: 'power2.out',
          overwrite: 'auto'
        }, countStart);
      }

      // Exit fade
      tl.to('#card', {
        opacity: 0,
        duration: 0.2,
        ease: 'power2.in',
        overwrite: 'auto'
      }, exitAt);

      window.__timelines = window.__timelines || {};
      window.__timelines['stat-metric-card'] = tl;
    </script>
  </div>
</body>
</html>
