<!DOCTYPE html>
<html
  data-composition-variables='[
    {"id":"chapter_number","type":"string","label":"Chapter Label (optional)","default":"CHAPTER 1"},
    {"id":"title","type":"string","label":"Title","default":"Building the System"},
    {"id":"description","type":"string","label":"Description (optional)","default":"How the agent pipeline is structured"},
    {"id":"hold_ms","type":"number","label":"Hold Duration ms","default":2500}
  ]'
>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      background-color: #09090b;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    /* Composition clips children so the extended blur never bleeds outside */
    [data-composition-id="chapter-break"] {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Extended 40px beyond all edges — blur always has source pixels to sample,
       no white edge bleed. overflow:hidden on parent clips it back to frame. */
    .bg-blur {
      position: absolute;
      inset: -40px;
      background: rgba(9, 9, 11, 0.65);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
      opacity: 0;
    }

    .chapter-card {
      position: relative;
      z-index: 1;
      width: 1080px;
      padding: 48px 72px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      opacity: 0;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      box-shadow:
        0 12px 48px rgba(0, 0, 0, 0.50),
        inset 0 1px 0 rgba(255, 255, 255, 0.10);
    }

    .chapter-number {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #a1a1aa;
      line-height: 1;
      opacity: 0;
    }

    .chapter-title {
      font-size: 78px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #ffffff;
      line-height: 1.05;
      opacity: 0;
    }

    .chapter-description {
      font-size: 24px;
      font-weight: 400;
      color: #71717a;
      margin-top: 4px;
      line-height: 1.4;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div
    data-composition-id="chapter-break"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="3.5"
    data-track-index="0"
  >
    <div class="bg-blur" id="bg-blur"></div>

    <div class="chapter-card" id="card">
      <span class="chapter-number" id="chapter-number">CHAPTER 1</span>
      <span class="chapter-title"  id="chapter-title">Building the System</span>
      <span class="chapter-description" id="chapter-description">How the agent pipeline is structured</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const vars = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables()
        : {
            chapter_number: 'CHAPTER 1',
            title: 'Building the System',
            description: 'How the agent pipeline is structured',
            hold_ms: 2500
          };

      const holdSec  = Math.max(0.5, (vars.hold_ms || 2500) / 1000);
      const exitAt   = 0.55 + holdSec;
      const totalDur = exitAt + 0.4;

      document.querySelector('[data-composition-id="chapter-break"]')
        .setAttribute('data-duration', totalDur.toFixed(2));

      const numEl   = document.getElementById('chapter-number');
      const titleEl = document.getElementById('chapter-title');
      const descEl  = document.getElementById('chapter-description');

      if (vars.chapter_number && vars.chapter_number.trim()) {
        numEl.textContent = vars.chapter_number;
      } else {
        numEl.style.display = 'none';
      }
      titleEl.textContent = vars.title || 'Chapter';
      if (vars.description && vars.description.trim()) {
        descEl.textContent = vars.description;
      } else {
        descEl.style.display = 'none';
      }

      const tl = gsap.timeline({ paused: true });

      // All initial states are opacity:0 in CSS — use tl.to() to animate INTO view
      tl.to('#bg-blur', {
        opacity: 1,
        duration: 0.3,
        ease: 'power2.out'
      }, 0.1);

      tl.to('#card', {
        opacity: 1,
        scale: 1,
        duration: 0.35,
        ease: 'power3.out',
        transformOrigin: '50% 50%'
      }, 0.25);

      // Text stagger — animate into visible position
      tl.to('#chapter-number', {
        opacity: 1,
        y: 0,
        duration: 0.25,
        ease: 'power2.out'
      }, 0.35);

      tl.to('#chapter-title', {
        opacity: 1,
        y: 0,
        duration: 0.3,
        ease: 'power2.out'
      }, 0.42);

      tl.to('#chapter-description', {
        opacity: 1,
        y: 0,
        duration: 0.25,
        ease: 'power2.out'
      }, 0.52);

      // Exit
      tl.to(['#bg-blur', '#card'], {
        opacity: 0,
        duration: 0.3,
        ease: 'power2.in',
        overwrite: 'auto'
      }, exitAt);

      window.__timelines = window.__timelines || {};
      window.__timelines['chapter-break'] = tl;
    </script>
  </div>
</body>
</html>
