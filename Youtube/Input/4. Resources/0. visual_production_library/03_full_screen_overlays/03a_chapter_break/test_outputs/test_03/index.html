<!DOCTYPE html>
<html
  data-composition-variables='[
    {"id":"chapter_number","type":"string","label":"Chapter Label (optional)","default":"PART THREE"},
    {"id":"title","type":"string","label":"Title","default":"Automation at Scale"},
    {"id":"description","type":"string","label":"Description (optional)","default":""},
    {"id":"hold_ms","type":"number","label":"Hold Duration ms","default":2500}
  ]'
>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      background: #09090b;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    /* Composition div fills the full canvas */
    [data-composition-id="chapter-break"] {
      width: 1920px;
      height: 1080px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Hero-frame: card fully visible, centred */
    .chapter-card {
      max-width: 720px;
      padding: 32px 48px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: center;

      /* Glass recipe — full-screen variant (deeper bg, more contrast) */
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.40),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .chapter-number {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a1a1aa;
      line-height: 1;
    }

    .chapter-title {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      line-height: 1.1;
    }

    .chapter-description {
      font-size: 18px;
      font-weight: 400;
      color: #71717a;
      margin-top: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div
    data-composition-id="chapter-break"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="3.5"
    data-track-index="0"
  >
    <div class="chapter-card" id="card">
      <span class="chapter-number" id="chapter-number">CHAPTER 1</span>
      <span class="chapter-title"  id="chapter-title">Building the System</span>
      <span class="chapter-description" id="chapter-description">How the agent pipeline is structured</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const vars = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables()
        : {
            chapter_number: 'CHAPTER 1',
            title: 'Building the System',
            description: 'How the agent pipeline is structured',
            hold_ms: 2500
          };

      const holdSec  = Math.max(0.5, (vars.hold_ms || 2500) / 1000);
      const exitAt   = 0.2 + 0.35 + holdSec;
      const totalDur = exitAt + 0.4;

      document.querySelector('[data-composition-id="chapter-break"]')
        .setAttribute('data-duration', totalDur.toFixed(2));

      // Apply content
      const numEl  = document.getElementById('chapter-number');
      const titleEl = document.getElementById('chapter-title');
      const descEl = document.getElementById('chapter-description');

      if (vars.chapter_number && vars.chapter_number.trim()) {
        numEl.textContent = vars.chapter_number;
      } else {
        numEl.style.display = 'none';
      }
      titleEl.textContent = vars.title || 'Chapter';
      if (vars.description && vars.description.trim()) {
        descEl.textContent = vars.description;
      } else {
        descEl.style.display = 'none';
      }

      const tl = gsap.timeline({ paused: true });

      // Background: body bg is already #09090b — fade the card in over the bg
      // Card entrance: scale(0.96) + opacity 0 → rest
      tl.from('#card', {
        scale: 0.96,
        opacity: 0,
        duration: 0.35,
        ease: 'power3.out'
      }, 0.2);

      // Stagger text elements slightly after card settles
      tl.from('#chapter-number', {
        opacity: 0,
        y: 6,
        duration: 0.25,
        ease: 'power2.out'
      }, 0.35);

      tl.from('#chapter-title', {
        opacity: 0,
        y: 10,
        duration: 0.3,
        ease: 'power2.out'
      }, 0.42);

      tl.from('#chapter-description', {
        opacity: 0,
        y: 8,
        duration: 0.25,
        ease: 'power2.out'
      }, 0.52);

      // Exit: entire card fades out
      tl.to('#card', {
        opacity: 0,
        duration: 0.3,
        ease: 'power2.in',
        overwrite: 'auto'
      }, exitAt);

      window.__timelines = window.__timelines || {};
      window.__timelines['chapter-break'] = tl;
    </script>
  </div>
</body>
</html>
