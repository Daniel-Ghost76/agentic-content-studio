<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: 'Space Grotesk';
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url('fonts/SpaceGrotesk.woff2') format('woff2');
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #09090b;
        font-family: 'Space Grotesk', system-ui, sans-serif;
      }
      #bg {
        position: absolute; inset: 0;
        width: 1920px; height: 1080px;
        object-fit: cover; z-index: 0;
      }
      /* Wrapper: layout-only, not a clip — handles vertical centering */
      .step-panel-wrapper {
        position: absolute;
        right: 160px;
        top: 0; bottom: 0;
        display: flex;
        align-items: center;
        z-index: 2;
        pointer-events: none;
      }
      /* Glass step list panel — capsule 02c, on-footage glass variant */
      .step-panel {
        width: 440px;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;

        background: rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 12px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.40),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);

        /* Initial state in CSS (flash-fix — animate IN with tl.to) */
        opacity: 0;
        transform: translateX(40px);
      }
      .step-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        /* Initial state — each row enters from right */
        opacity: 0;
        transform: translateX(8px);
      }
      .step-num {
        font-size: 13px;
        font-weight: 600;
        color: #a1a1aa;
        min-width: 20px;
        flex-shrink: 0;
      }
      .step-text {
        font-size: 18px;
        font-weight: 500;
        color: #ffffff;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!-- Visual track: muted footage slice (raw 311s–326s) -->
      <video
        id="bg"
        class="clip"
        src="bg.mp4"
        data-start="0"
        data-duration="15"
        data-track-index="0"
        muted
        playsinline
        crossorigin="anonymous"
      ></video>

      <!-- Audio track: same source, full volume -->
      <audio
        id="aud"
        class="clip"
        src="bg.mp4"
        data-start="0"
        data-duration="15"
        data-track-index="1"
        data-volume="1"
        crossorigin="anonymous"
      ></audio>

      <!-- Overlay: glass step list (wrapper is layout-only; panel is the clip) -->
      <div class="step-panel-wrapper">
        <div
          class="step-panel clip"
          id="panel"
          data-start="0"
          data-duration="15"
          data-track-index="2"
        >
          <div class="step-row" id="row-1">
            <span class="step-num">01</span>
            <span class="step-text">Input &#8212; CSV goes here</span>
          </div>
          <div class="step-row" id="row-2">
            <span class="step-num">02</span>
            <span class="step-text">Output &#8212; transcripts populate</span>
          </div>
          <div class="step-row" id="row-3">
            <span class="step-num">03</span>
            <span class="step-text">Tools &#8212; yt-dlp lives here</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Panel slides in from right just before Daniel says "input folder" (~2.3s into slice)
      tl.to('#panel', { opacity: 1, x: 0, duration: 0.3, ease: 'power3.out' }, 2.3);

      // Steps reveal as Daniel names each folder (times relative to 311s slice start)
      tl.to('#row-1', { opacity: 1, x: 0, duration: 0.25, ease: 'power2.out' }, 2.82);  // 313.82s raw — "input folder"
      tl.to('#row-2', { opacity: 1, x: 0, duration: 0.25, ease: 'power2.out' }, 4.80);  // 315.80s raw — "output folder"
      tl.to('#row-3', { opacity: 1, x: 0, duration: 0.25, ease: 'power2.out' }, 11.66); // 322.66s raw — "tools folder"

      // Hold 2s after final step, then panel exits
      tl.to('#panel', { opacity: 0, duration: 0.2, ease: 'power2.in' }, 13.66);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
