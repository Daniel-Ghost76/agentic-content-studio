<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: 'Space Grotesk';
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url('fonts/SpaceGrotesk.woff2') format('woff2');
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #09090b;
        font-family: 'Space Grotesk', system-ui, sans-serif;
      }

      /* Footage fills the frame (track 0) */
      #bg {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
        z-index: 0;
      }

      /* Glass callout card — capsule 02a, on-footage glass variant */
      .callout-card {
        position: absolute;
        bottom: 160px;
        left: 160px;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 16px 20px;
        min-width: 240px;
        max-width: 420px;

        /* Glass recipe — on-footage variant: fill 0.10, blur 12px */
        background: rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 12px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.40),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);

        /* Initial state in CSS (channel flash-fix — animate IN with tl.to) */
        opacity: 0;
        transform: translateX(-40px);
      }

      .card-label {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #a1a1aa;
        line-height: 1;
      }

      .card-value {
        font-size: 36px;
        font-weight: 600;
        color: #ffffff;
        line-height: 1.15;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="7"
      data-width="1920"
      data-height="1080"
    >
      <!-- Visual track: muted footage slice (raw 134.0s–141.0s) -->
      <video
        id="bg"
        class="clip"
        src="bg.mp4"
        data-start="0"
        data-duration="7"
        data-track-index="0"
        muted
        playsinline
        crossorigin="anonymous"
      ></video>

      <!-- Audio track: same source, full volume -->
      <audio
        id="aud"
        class="clip"
        src="bg.mp4"
        data-start="0"
        data-duration="7"
        data-track-index="1"
        data-volume="1"
        crossorigin="anonymous"
      ></audio>

      <!-- Overlay: glass callout card -->
      <div
        class="callout-card clip"
        id="card"
        data-start="0"
        data-duration="7"
        data-track-index="2"
      >
        <span class="card-label">TOOL</span>
        <span class="card-value">yt-dlp</span>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Card enters just before "yt-dlp" is spoken (~2.78s into the slice)
      tl.to('#card', { opacity: 1, x: 0, duration: 0.3, ease: 'power3.out' }, 2.5);
      // Hold ~3s, then fade out
      tl.to('#card', { opacity: 0, duration: 0.2, ease: 'power2.in' }, 5.5);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
