title: "I Scheduled a YouTube Video With 2 Voice Prompts — Codex Mobile Demo"

description: |
  OpenAI just dropped Codex Mobile — and I used it to schedule a YouTube video from my phone with 2 voice prompts. I never touched the computer.

  You'll see it send a WhatsApp message to a client, pull up my video library, and publish a scheduled post to YouTube Studio — all from the Codex Mobile app on your phone. No keyboard. No clicking. Your machine does the work. You just direct it from your phone.

  TOOLS USED:
  - Codex Mobile — ChatGPT app → scan QR code → connected to your Mac
  - Claude Code Remote Control — Pro plan alternative for phone control
  - WhatsApp — client message demo
  - YouTube Studio — video scheduling demo

