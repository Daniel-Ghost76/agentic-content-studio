<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daybreak</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050507">
</head>
<body>
<canvas id="aurora"></canvas>

<main>
  <section id="left">
    <div id="hero">
      <div id="date"></div>
      <div id="focus"></div>
      <div id="ring-wrap">
        <svg id="ring" viewBox="0 0 120 120">
          <circle class="track" cx="60" cy="60" r="54"/>
          <circle class="fill" cx="60" cy="60" r="54" id="ring-fill"/>
        </svg>
        <div id="ring-label"><b id="rating">0%</b><span id="hours">0h</span></div>
      </div>
    </div>

    <div id="inputs">
      <label class="field-label" for="improve">How can I improve?</label>
      <div id="improve-row">
        <textarea id="improve" rows="2" placeholder="Feedback on today…"></textarea>
        <button id="mic" title="Speak your answer" aria-label="Voice input">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <rect x="9" y="3" width="6" height="11" rx="3"/>
            <path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>
          </svg>
        </button>
      </div>
      <label class="field-label" for="notes">Notes</label>
      <textarea id="notes" rows="3" placeholder="Instructions and thoughts for tomorrow…"></textarea>

      <div id="plan-wrap">
        <button id="plan-tmrw">Plan the week ahead</button>
        <div id="plan-progress" hidden>
          <svg viewBox="0 0 80 80">
            <circle class="track" cx="40" cy="40" r="34"/>
            <circle class="fill" cx="40" cy="40" r="34" id="plan-fill"/>
          </svg>
          <span id="plan-pct">0%</span>
        </div>
        <div id="plan-msg" hidden>Planning the week — reading your progress, notes, goals, and calendar…</div>
      </div>
    </div>
  </section>

  <section id="right">
    <div id="day-strip"></div>
    <div id="stream">
      <h2>Priorities</h2>
      <div id="prio-list"></div>
      <h2>Timeline</h2>
      <div id="tl"></div>
    </div>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
