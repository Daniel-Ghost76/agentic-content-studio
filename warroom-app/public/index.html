<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daybreak</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050507">
</head>
<body>
<canvas id="aurora"></canvas>
<div id="grain"></div>

<main>
  <section id="hero">
    <div id="date"></div>
    <div id="focus"></div>
    <div id="ring-wrap">
      <svg id="ring" viewBox="0 0 120 120">
        <circle class="track" cx="60" cy="60" r="54"/>
        <circle class="fill" cx="60" cy="60" r="54" id="ring-fill"/>
      </svg>
      <div id="ring-label"><b id="rating">0%</b><span id="hours">0h</span></div>
    </div>
  </section>

  <section id="priorities">
    <h2>Priorities</h2>
    <div id="prio-list"></div>
  </section>

  <section id="timeline">
    <h2>Today</h2>
    <div id="tl"></div>
  </section>

  <section id="closing">
    <textarea id="improve" rows="2" placeholder="How can I improve?"></textarea>
    <button id="report">Send report</button>
    <button id="enable-push" hidden>Enable notifications</button>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
