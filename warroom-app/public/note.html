<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daybreak — Checklist</title>
<style>
  :root {
    --bg: #050507;
    --card: rgba(255, 255, 255, 0.045);
    --card-line: rgba(255, 255, 255, 0.08);
    --fg: #f4f4f5;
    --dim: #9a9aa3;
    --faint: #5b5b66;
    --green: #3fb950;
    --serif: ui-serif, 'New York', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; }
  html { background: var(--bg); }
  body {
    background: linear-gradient(180deg, #050507 0%, #0a0b10 60%, #07080c 100%);
    color: var(--fg);
    font: 14px/1.5 -apple-system, 'SF Pro Text', sans-serif;
    padding: 22px 18px 40px;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; z-index: -1;
    width: 80vmax; height: 80vmax;
    border-radius: 50%;
    filter: blur(80px); opacity: .1;
    background: radial-gradient(circle at 45% 45%, rgba(255,255,255,.9), rgba(255,255,255,0) 60%);
    animation: drift 24s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { top: -45vmax; left: -30vmax; transform: scale(1); }
    to   { top: -20vmax; left: 10vw;    transform: scale(1.2); }
  }
  h1 {
    font-family: var(--serif);
    font-size: 12px; font-weight: 500;
    letter-spacing: 7px; text-transform: uppercase;
    color: var(--dim);
  }
  .date { font-family: var(--serif); font-size: 19px; font-weight: 600; margin: 8px 0 2px; }
  .stats { color: var(--faint); font-size: 12px; margin-bottom: 4px; }
  .focus { font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--dim); margin-bottom: 14px; }
  h2 { font-size: 10px; letter-spacing: 2.5px; color: var(--faint); margin: 18px 0 6px 2px; text-transform: uppercase; }
  .item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 10px; margin-bottom: 5px;
    background: var(--card);
    border: 1px solid var(--card-line);
    border-radius: 11px;
    cursor: pointer;
    transition: background .25s;
  }
  .item:hover { background: rgba(255,255,255,.07); }
  .item .circle {
    width: 18px; height: 18px;
    border: 1.5px solid var(--faint); border-radius: 50%;
    flex: none; margin-top: 1px;
    transition: all .2s;
  }
  .item.done .circle { background: var(--green); border-color: var(--green); box-shadow: 0 0 10px rgba(63,185,80,.35); }
  .item.done span:last-child { opacity: .4; text-decoration: line-through; text-decoration-thickness: 1px; }
  .item time { color: var(--faint); font-size: 12px; flex: none; width: 78px; margin-top: 2px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<h1>Daybreak</h1>
<div class="date" id="date"></div>
<div class="stats" id="stats"></div>
<div class="focus" id="focus"></div>
<h2>Priorities</h2>
<div id="prios"></div>
<h2>Schedule</h2>
<div id="sched"></div>
<script>
const KEY = localStorage.warroomKey ||
  (localStorage.warroomKey = new URLSearchParams(location.search).get('key') || '');
const H = { 'x-warroom-key': KEY, 'Content-Type': 'application/json' };
let day = null;

async function api(path, body) {
  const res = await fetch('/api/' + path,
    body ? { method: 'POST', headers: H, body: JSON.stringify(body) } : { headers: H });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function endtime(t) {
  let [h, m] = t.split(':').map(Number);
  m += 30; return String(h + Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');
}

function render() {
  document.getElementById('date').textContent = new Date(day.date + 'T12:00')
    .toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('stats').textContent = `${day.score.rating ?? 0}% · ${day.score.hours ?? 0}h focused`;
  document.getElementById('focus').textContent = day.focus;

  const prios = document.getElementById('prios');
  prios.innerHTML = '';
  day.priorities.forEach((p) => {
    const el = document.createElement('div');
    el.className = 'item' + (p.done ? ' done' : '');
    el.innerHTML = `<span class="circle"></span><span>${p.text}</span>`;
    el.onclick = () => api('tick', { date: day.date, taskId: p.id, done: !p.done }).then(set);
    prios.appendChild(el);
  });

  const runs = [];
  day.slots.filter((s) => s.taskId).forEach((s) => {
    const last = runs[runs.length - 1];
    if (last && last.tid === s.taskId && last.end === s.time) {
      last.end = endtime(s.time); last.done = last.done && !!s.done; last.times.push(s.time);
    } else {
      runs.push({ tid: s.taskId, start: s.time, end: endtime(s.time), done: !!s.done, times: [s.time] });
    }
  });
  const sched = document.getElementById('sched');
  sched.innerHTML = '';
  runs.forEach((r) => {
    const t = day.priorities.find((p) => p.id === r.tid);
    const el = document.createElement('div');
    el.className = 'item' + (r.done ? ' done' : '');
    el.innerHTML = `<time>${r.start}–${r.end}</time><span class="circle"></span><span>${t ? t.text : r.tid}</span>`;
    el.onclick = async () => {
      for (const time of r.times) await api('tick', { date: day.date, time, done: !r.done });
      set(await api('day/today'));
    };
    sched.appendChild(el);
  });
}

function set(d) { day = d; render(); }
api('day/today').then(set).catch((e) => { document.body.innerHTML = '<h1 style="padding:30px">' + e.message + '</h1>'; });
setInterval(() => api('day/today').then(set).catch(() => {}), 15_000);
</script>
</body>
</html>
