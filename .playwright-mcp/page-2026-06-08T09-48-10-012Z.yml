                        - generic [ref=e15519]:
                          - generic [ref=e15520]:
                            - text: That isn't going to happen. To me what is going on is that no one really reads anything positive so there is all the incentives to write as hyperbolic + negative as possible to try to rise through the noise.
                            - paragraph [ref=e15521]: The reality is this all the standard lump of labor fallacy. I am not a software engineer but it is obvious to me at some point I will be using claude code or whatever to automate tasks. I won't be taking software engineering jobs, I will be using code to do what is done manually today that you wouldn't bother paying a software engineer to handle.
                            - paragraph [ref=e15522]: Today's software engineers will just be higher up the stack from me the same way they are today.
                            - paragraph [ref=e15523]: In 20 years, many of us will be working in sectors of the economy that don't exist today.
                            - paragraph [ref=e15524]: The idea we get something as powerful as AI and it doesn't create new businesses and sectors is just stupid.
                            - paragraph [ref=e15525]: Imagine telling someone in 1997 they are going to be getting deliveries from Amazon all the time in the mail. What kind of idiot would believe this? I don't even read that many books!
