            - row "upvote rfgplk 10 hours ago | | | [–] > “Verify all facts and compliance requirements” No. This is a disasterous instruction. Not only is it vague, but it's also meaningless. When giving instructions to an LLM your prompt must be concise and exact. Tell it _exactly_ which requirements need to be followed, ideally have it write or (preferably) pass audited tests to enforce these requirements. You also need to provide it with a hard source of truth it can rely upon. Instead of saying \"verify facts\", you're better off by saying \"... make sure [whatever you're doing] matches with data at X.Y.Z, verify by running [instruction/command/program]\" reply" [ref=e3942]:
