            - row "upvote dbetteridge 7 hours ago | | | [–] To answer your first question (apologies should have done so in the first reply) It isn't worse, objectively the end result is favourable even if the \"driver\" for it is not (to me). I accept your counter point that at a macro level society requires a set of checks and reinforcement to bias individuals towards social good behaviour, community enforcement is obviously one and religion can be another. But I would argue that while the state legal framework is secular it encodes some moral principles that society has agreed on such as murder, theft, harming other physically or otherwise etc. I also hold no issue with others holding beliefs that shape their morality, I just reject the argument that people without a god cannot have innate morality or a secular morality (a common refrain). reply" [ref=e18366]:
