            - row "upvote skeledrew 19 hours ago | | [–] Yeah the writing is on the wall. Not just for knowledge work, but for jobs in general, as I've been saying in other comments. The era of wage labour, and this dominant economic system, is coming to an end. There's no way it can coexist with AI, but it also needs to continuously push for better AI, which means there's no stopping it. The only thing to do really is brace for the disruption - which will likely be pretty rough - and hope governments play their role properly to ease the transition. reply" [ref=e21921]:
