            - 'row "upvote trumpdong 11 hours ago | | | [–] Some famous examples of a \"10x developer\" state: Linus Torvalds writing Git, Brendan Eich writing JavaScript. Somewhat less famously, I get that feeling often when I stop thinking and start doing on an electronics project, a wooden shed or even a cosplay. Every hackathon ever, same principle - stop thinking, start doing. But it''s only a 10x state if you''re doing the right thing, otherwise it''s a -10x state, and that means you need to have already done the right amount of thinking and have a good intuition for what you''re trying to do. (As long as you can recognize a failed experiment and revert, risk of being -10x isn''t that terrible) reply" [ref=e6797]':
