                            - text: "> when I step outside my area of deep knowledge I can no longer call BS on the agents"
                            - paragraph [ref=e25730]: It's still funny that 4 years into this mania the models can hallucinate basic ground truths, humans are increasingly not reviewing the output, and misusing LLMs where simple automation would suffice.
                            - paragraph [ref=e25731]: My wife does project management and works with a lot of tech leads. They came to her with a project plan deck, and she started questioning some weird dates.
                            - paragraph [ref=e25732]: The LLM was able to pull artifacts out of their issuer tracker, but it just.. hallucinated some of the dates in the process of creating a project plan deck out of the underlying data. These guys didn't care to review and notice, and who knows what else it hallucinated content wise. They were happy to send this project plan multiple levels up the food chain with hallucinated unreviewed dates.
