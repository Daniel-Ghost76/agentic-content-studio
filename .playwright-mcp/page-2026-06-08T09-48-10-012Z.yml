                          - generic [ref=e11660]:
                            - text: "re: SUNO"
                            - paragraph [ref=e11661]: i actually was discussing that with a guy i met the other day, an old school producer, did succesful stuff 30 years ago. He used SUNO to reinterpret old and ideas of his, in his judgement it did an excellent job and lets him create many songs daily if he want.
                            - paragraph [ref=e11662]: Sounds familliar? the good old "let AI be steered by experienced X and boost productivity".
                            - paragraph [ref=e11663]: All in all, gun to the head, i think i am so critical because to use these tools is surrendering to big corpos. It is not a democratic tool. If it was i would probably be using it. I have finally given up and started messing with local models (well, i did already with images) but general local models are useless.
                            - paragraph [ref=e11664]: OR maybe it's me? i cannot for one moment let go and converse with the machine. I can give order to the machine.
                            - paragraph [ref=e11665]: The tech is fantastic, but the fact that it's in the hand of corpos with all interests in never letting us be able to do shit without them, makes me one hundred and one percent against it.
