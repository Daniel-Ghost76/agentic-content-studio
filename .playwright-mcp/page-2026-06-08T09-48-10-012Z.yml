            - row "upvote jalev 20 hours ago | | | [–] I might have been a bit broad with the brush. I can't speak for banks, but I can speak for the the fintech/money-movement space (e.g. Remitly, Wise, Revolut). It's a race to get first-to-market for backend integrations/features. It's given rise to a culture of \"move fast break things\" where safety is only for some core features, but absolutely not for the constellation of other services we provide. Failure rates have increased almost a percentage point since Codegen/LLM adoption was mandated from up top. You would think regulators would be on top of this, but our industry runs on all actors \"self reporting\" their outages. Most don't unless they can't hide it (>1h) reply" [ref=e7986]:
