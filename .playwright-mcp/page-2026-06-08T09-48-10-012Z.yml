                        - generic [ref=e26308]:
                          - generic [ref=e26309]:
                            - text: The idea is to start with the largest, easiest lever. The one which will accelerate all _other_ automation. That lever is software development itself.
                            - paragraph [ref=e26310]: Say you are Anthropic and want to shake up the world of law or medicine or whatever. What will you need? Product managers? You need tooling, software, infrastructure and a lot of it and quickly and you need to iterate really F fast on it as well.
                            - paragraph [ref=e26311]: If you automate the development of software itself you will enter a new era in which automation of All The Things becomes an engineering problem instead of a pipe dream. Besides software engineering there is (AI) research/science and robotics. That is the holy trinity. Crack that and it's over.
                            - paragraph [ref=e26312]: "BTW: \"double-entry ledgers, escrows, reconciliation, payment lifecycles, bank transfer idempotency\", these all sound like solved problems and also things that are festering with accidental instead of essential complexity. I won't bet my career on those things. Now if you say something like physics or geology, that's a tougher nut to crack."
