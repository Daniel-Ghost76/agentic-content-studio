                        - generic [ref=e12800]:
                          - generic [ref=e12801]:
                            - text: Sumo produces plausible cheesy stuff that is otherwise sonically awful, ringing alongside the full spectrum due to how it works. As a musician I would not use it - I like to keep some creative power. Some people use it around me for samples… and then their tracks ring. But it works for them as they be advertising producers. Mind u - I’ve used paid version and I know one or two about music production.
                            - paragraph [ref=e12802]: As an information architect I find it amazing it works so good, but is useless to me except being a great think to play with… a toy really. I’m much more fascinated by Strudel.cc and LLMs do a great job to educate me into it, myself being mostly an autodidact.
                            - paragraph [ref=e12803]: As a dev I struggle to maintain coherence with Claude Code even though I’ve piped more than 10b tokens since Jan. Certain trivial stuff is easily remedied but even more devil lives in abundance of details now. So the task moves one level above in terms of abstraction, but is not solved.
                            - paragraph [ref=e12804]: If guys were good at typing one and the same thing in one and the same lang, which is nothing wrong about given how crafts went for ages, then they will be struggling to compete with the GPTs. But if they are in the architectural and operational perspective … well - work and demand just increased, so please stop whining.
