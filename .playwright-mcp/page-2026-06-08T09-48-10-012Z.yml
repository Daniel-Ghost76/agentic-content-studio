                        - generic [ref=e20076]:
                          - generic [ref=e20077]:
                            - text: Same boat here, just a couple years more experience.
                            - paragraph [ref=e20078]: Current LLMs are still kind of shit at actually programming so many jobs do still care to have professional programmers. However, I think it's evident that if things stand where they are, employers will care to have far fewer of them, at least of highly paid highly experienced programmers. If this is the state we're in with LLM adoption when they can't help but create the same helper functions 15 times, god knows we're screwed.
                            - paragraph [ref=e20079]: So we should probably work on clearing out our debts and figuring out what else we might want to do with our time, I reckon.
                            - paragraph [ref=e20080]: I'm still going to try to do a good job. I'm still trying to learn the best effective ways to apply current LLMs (Right now I still prefer to mostly write code myself but have been using LLMs to bang code into shape via iterative code review; this is a way to exploit LLMs to make better code, especially applicable if your velocity was already good.)
