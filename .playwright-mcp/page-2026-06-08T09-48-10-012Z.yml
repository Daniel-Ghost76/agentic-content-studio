                            - text: My boss came up to me and said a coworker using LLM tools has shipped more customer solutions in a week than basically what I've done in 3 months.
                            - paragraph [ref=e26049]: The bosses are out to force people like you to use AI. And have been for months.
                            - paragraph [ref=e26050]: Maybe not your boss yet, but it swept through my office dramatically. Maybe two or three months from limited tests to now today FORCED usage of AI (people going around the office asking constantly if there's any AI that can help today).
                            - paragraph [ref=e26051]: "----------"
                            - paragraph [ref=e26052]: This has a few toxic effects.
                            - paragraph [ref=e26053]: 1. You are not allowed to complain about code quality issues anymore. Any complaints are met with okay, we will get the AI to fix it.
                            - paragraph [ref=e26054]: No discussion, no elaboration. No one in the office is even interested anymore. AI solves everything.
                            - paragraph [ref=e26055]: 2. You are basically in a position where you are forced to use AI, whether you want it or not.
                            - paragraph [ref=e26056]: 3. I expect code quality at my office to drop dramatically as fewer and fewer office mates give a shit
