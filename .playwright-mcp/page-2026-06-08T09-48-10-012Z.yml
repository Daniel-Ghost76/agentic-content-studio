                          - generic "2026-06-08T08:45:54 1780908354" [ref=e9309]:
                            - link "1 hour ago" [ref=e9310] [cursor=pointer]:
                              - /url: item?id=48442815
                          - generic [ref=e9311]:
                            - text: "|"
                            - link [ref=e9312] [cursor=pointer]:
