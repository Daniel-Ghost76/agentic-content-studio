                        - generic [ref=e14217]:
                          - generic [ref=e14218]:
                            - text: "I've posted this before but worth posting again:"
                            - paragraph [ref=e14219]: I work in DevOps at a firm that has been very enthusiastic about using LLMs (in the good sense).
                            - paragraph [ref=e14220]: "The phases were basically:"
                            - paragraph [ref=e14221]: "- try out having the LLM do \"a lot\""
                            - paragraph [ref=e14222]: "- now even more"
                            - paragraph [ref=e14223]: "- now run multiple agents"
                            - paragraph [ref=e14224]: "- back to single agents but have the agents build tools"
                            - paragraph [ref=e14225]: "- tools that are deterministic AND usable by both the humans (EDIT: and the LLMs)"
                            - paragraph [ref=e14226]: "The reasons:"
                            - paragraph [ref=e14227]: 1. Deterministic tools (for both deployments and testing) get you a binary answer and it's repeatable
                            - paragraph [ref=e14228]: 2. In the event of an outage, you can always fall back to the tool that a human can run
                            - paragraph [ref=e14229]: 3. It's faster. A quick script can run in <30 seconds but "confabulating" always seemed to take 2-3 minutes.
                            - paragraph [ref=e14230]:
                              - text: "Really, we are back to this article:"
                              - link "https://spawn-queue.acm.org/doi/10.1145/3194653.3197520" [ref=e14231] [cursor=pointer]:
                                - /url: https://spawn-queue.acm.org/doi/10.1145/3194653.3197520
                              - text: aka "make a list of tasks, write scripts for each task, combine the scripts into functions, functions become a system"
                            - paragraph [ref=e14232]: "-- END of original post --"
                            - paragraph [ref=e14233]: "What I would add:"
                            - paragraph [ref=e14234]: if you let LLMs do whatever they want, they will happily make code. You can add tests to confirm that the tests work (which you used to do with human code, right?). You can also read the code.
                            - paragraph [ref=e14235]: When you read the code, you'll find that they sometimes do totally bananas things that still produce working code (I've seen humans do this too but that's another story).
                            - paragraph [ref=e14236]: In other words, you still need to make sure the system being built makes sense.
                            - paragraph [ref=e14237]: "More succinctly:"
                            - paragraph [ref=e14238]: Coding may be dead but software engineering is alive and kicking.
                          - paragraph [ref=e14240]:
                            - link "reply" [ref=e14243] [cursor=pointer]:
                              - /url: reply?id=48436165&goto=item%3Fid%3D48434312%2348436165
            - row "upvote esalman 5 hours ago | | [–] This is pretty much how I've been operating. While the C-suits have been always encouraging everyone- technical and non-technical folks alike- to use AI, the ask from my manager and skip level has always been for deterministic output. Before last December or January I was mainly using LLMs for autocomplete, whereas now it looks more like \"given this input write script to generate this output\", and after some corrections, \"summarize/update this session into a skill\". Script for future humans, skill for future agents. reply" [ref=e14244]:
