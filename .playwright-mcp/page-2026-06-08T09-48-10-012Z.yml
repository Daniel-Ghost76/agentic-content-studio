                        - generic [ref=e18817]:
                          - generic [ref=e18818]:
                            - text: I think that social justice replaced the religious preaching of values in many circles but it was well… it’s not a sort of thing that many find appealing to follow.
                            - paragraph [ref=e18819]: Concepts like "checking your privilege" or being "canceled" closely parallel religious ideas of original sin and repentance, where individuals must acknowledge their unearned moral failings to become "good".
                            - paragraph [ref=e18820]: Actions like using specific pronouns, displaying yard signs, or performing land acknowledgments function similarly to reciting a catechism; they signal allegiance to a shared belief system and reassure the in-group
                            - paragraph [ref=e18821]: Protests and social movements often evoke the communal, revival-like atmosphere of religious gatherings, providing participants with a sense of purpose and belonging.
                            - paragraph [ref=e18822]: But what’s most convincing is that many times it is hypocritical in the same way religions are. There is no room for questioning or doubt and yet the actions do not align with the performance. Which means it isn’t driven by dry results but fulfills a deeper human need.
