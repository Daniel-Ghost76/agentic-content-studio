                        - generic [ref=e27297]:
                          - generic [ref=e27298]:
                            - text: There is an element of human nature that is known as self delusion and it is extremely common. Almost everyone on HN is suffering from a form of self delusion.
                            - paragraph [ref=e27299]: Usually when a human self deludes they do it when they're identity is under threat. People would rather hold on to identity then face the truth at the cost of their identity. That is what is going on in almost every HN thread that has to do with this topic.
                            - paragraph [ref=e27300]: A good example is religion. Someone who is intelligent, but born into a religion, will have a hard time giving up that religion EVEN when presented with logical/rational/realistic arguments for why that religion is false. They will rationalize the most convenient reasoning to maintain their own identity.
                            - paragraph [ref=e27301]: I mean think about it. Even the concept of religion is obviously false. It's not science, it talks about phantasmic beings that OBVIOUSLY don't exist. It's inconsistent among different groups as in there's thousands of religions in the world and nobody thinks the obvious of the fact that if only religion can be correct, then most of the world is fundamentally believing a total lie.
                            - paragraph [ref=e27302]: Anyway, the same thing is happening with AI. AI is eroding our identity as software engineers. So you'll see rationalizations in this thread in attempt to protect that identity. The biggest excuse is LLMs are hallucinate and are often wrong and fortunately for humans... this rationalization still works because it's still very true.
                            - paragraph [ref=e27303]: However what people are not mentioning is the obvious. People are avoiding it because they are delusional. The topic of this thread is "erosion" of "software engineering career" AND that is utterly true. ADDITIONALLY the error rate of LLMs have been going down. AI in general is improving. The erosion is real and obvious.
                            - paragraph [ref=e27304]: But you will see here on this thread that people are not talking about the erosion. They are holding on to the one last rationalization that is a differentiator without ever thinking about how that differentiator is "eroding" even though "erosion" is the LITERAL topic of the conversation.
