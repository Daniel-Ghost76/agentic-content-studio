                        - generic [ref=e19620]:
                          - generic [ref=e19621]:
                            - text: He says that taste doesn't matter and it hasn't in the past. However, in an era of "extruded code product" (by analogy to
                            - link "https://tvtropes.org/pmwiki/pmwiki.php/Main/ExtrudedBookProd..." [ref=e19622] [cursor=pointer]:
                              - /url: https://tvtropes.org/pmwiki/pmwiki.php/Main/ExtrudedBookProduct
                            - text: ) automatically generated by the truckload at negligible cost, the differentiator for software developers will necessarily be the ability to create a product that doesn't reek of extruded code product, i.e. the things like quality that he labels taste.
                            - paragraph [ref=e19623]: (Whether any one reading this, myself included, survives in the industry long enough to reach the other side of that transition is a different question.)
                            - paragraph [ref=e19624]:
                              - text: "[EDIT] The reason I use books as an example is that 4.2 million books were published in 2025 ("
                              - link "https://ideas.bkconnection.com/10-awful-truths-about-publish..." [ref=e19625] [cursor=pointer]:
                                - /url: https://ideas.bkconnection.com/10-awful-truths-about-publishing
                              - text: ); 3.5m self published (with most likely LLM assisted or wholly generated) and the remainder traditionally published. (That's ~9,600 new self-published books a day.) Who actually still sells enough copies to make money in this paradigm and why offers hints as to where the software industry is likely headed.
                          - paragraph [ref=e19627]:
                            - link "reply" [ref=e19630] [cursor=pointer]:
