                        - generic [ref=e12361]:
                          - generic [ref=e12362]:
                            - text: "> I don't think that's a bug or unexpected"
                            - paragraph [ref=e12363]: In this particular case, it really gave some "uncanny valley" feeling. That is, on the surface, it sounds like something familiar, but something is off. The wrongness was completely unintended, not prompted for, but interesting, in the same way that eldritch horror is interesting.
                            - paragraph [ref=e12364]: I wanted to mix heavy metal and hardstyle, the idea I had in mind was to imagine a battle, one side being represented by one style, and the other, by another style, each side responding to the other. It didn't give that much thought to it, but it sounded fun. And instead of getting the back and forth I expected, I got... weirdness.
                            - paragraph [ref=e12365]: I then tried to add some matching lyrics, that is, something similarly uncanny, also using AI. It also turned out to be somewhat difficult and not all LLMs managed to pull it off (ended up with GPT-5.5). That is, for many LLMs, especially the small, self-hosted ones, I couldn't get the effect I wanted, even after trying different prompt strategies. Scary words, spooky scenes, etc... no problem, but that's the opposite of what I wanted. I wanted something subtly wrong, not an B movie horror scene. Also, by adding the lyrics to the song, Suno lost a bit of an edge to the song.
                            - paragraph [ref=e12366]:
                              - text: "If you are interested, here are the links, with and without lyrics. Don't expect anything good, it is just a little experiment:"
