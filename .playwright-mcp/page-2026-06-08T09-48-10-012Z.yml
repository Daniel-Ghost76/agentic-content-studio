            - row "upvote dpcan 16 hours ago | | [–] The problem with “code quality” and LLM’s taking over your first 3 “pillars” is basically that LLM’s don’t care. I recently had Cursor evaluate a huge code base that we took over. All public stuff, nothing scary security wise, but it was so convoluted that it was taking me forever to find the bugs. It was written by a person, I should add. I did this in cursor and after one prompt using Plan, it found all the bugs, created a plan to fix them, it looked good, and I had the agent create the fix. It took 30 minutes. The client had this project in the hands of another company without ai tools and they couldn’t fix the bugs she told them about. So my point is, if we are holding on to our jobs for dear life on the basis that “code quality” matters, you might as well kick down the 4th pillar. Like I said, the LLM does not care. reply" [ref=e22629]:
