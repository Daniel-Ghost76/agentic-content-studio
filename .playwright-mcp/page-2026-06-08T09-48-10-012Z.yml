                        - generic [ref=e27546]:
                          - generic [ref=e27547]:
                            - text: "Of the posts I've seen by senior devs who assess recent events and end up roughly here:"
                            - paragraph [ref=e27548]: "> I'm still employed and I see myself employed for a foreseeable future. But I don't know what to think about the long-term ... Maybe I should consider transforming my woodworking hobby into a profession."
                            - paragraph [ref=e27549]: This one is notable for having all the clues pointing to why that's not the end-state this is headed toward, and yet... still not quite see it.
                            - paragraph [ref=e27550]: "> I have no domain expertise that another Sr. engineer steering an LLM cannot match."
                            - paragraph [ref=e27551]: It's clear he's developed a significant competence in "steering an LLM" but the depth and value of that aren't apparent yet. After ~70 years, software development is now in the early stages of its first tectonic disruption. In the moment, these kinds of tech disruptions mostly appear to be displacing jobs but, historically, we understand the displacement is one part of a larger shift that's vertically compressing roles, functions and labor value. One steam shovel doesn't just displace dozens of pick-axe swinging diggers, it changes the roles, functions and competencies required across the entire supervision and management stack of "make tunnel through mountain" from the crew bosses and site managers to the tunnel engineers and business owners.
                            - paragraph [ref=e27552]: The author seems to be successfully navigating this shift but is still mid-disruption, so he and his management aren't yet able to see all the new competencies required or appreciate their value because it's all so new and still evolving. The rapid shock of agentic coding LLMs is especially disorienting because it's the first dramatic disruption in the field.
                            - paragraph [ref=e27553]: "> review the code and steer the robot."
                            - paragraph [ref=e27554]: Historically, it's not surprising those few words are bearing so much weight and unappreciated value. Steam power was a similar shock to every field which relied on earth-moving and shaping. The big machines were quickly deployed, but it took quite a while for all the disruptions to both new and existing roles, functions and necessary competencies to be understood and appropriately valued. I imagine some top pick-axe swingers who'd graduated to being crew bosses and site foremen ended up driving or directing early steam shovels. In the first months they probably had little appreciation for the tremendous amounts of tacit new knowledge and practical expertise they accrued while keeping the steel beasts working. They were too busy being both amazed at the sheer power and frustrated by the constant scalding burns, tip-overs, blown boilers, landslides (too much weight, too little support) and cave-ins (dug too much tunnel, too fast with too little scaffolding), etc.
                            - paragraph [ref=e27555]: A big difference in the analogy is the first 100,000 steam shovels weren't sold at ~1/10th their actual cost and simultaneously delivered to job sites worldwide in six months. Software engineering is also unlike earth-moving and tunnel digging, in that the full costs and consequences aren't as visible or immediate as cave-ins and avalanches. The prices of 'steel beasts' are already going vertical with no end in sight and, over the next 18 months, I suspect "management" is about to gain a more viscerally accurate appreciation of the catastrophic costs of digging 'too much tunnel, too fast' absent the close supervision of highly skilled experts in directing all that newfound power constructively and not destructively. Between the skyrocketing full cost of operation and the consequences of poorly managed, non-expert execution - we'll start to see the broad outlines of the new equilibrium take shape.
                            - paragraph [ref=e27556]: In the steam era it over a decade for the ecosystem to understand how to even draw a new org chart accurately, label the boxes and appropriately value proven competency where it mattered. The faster the disruption, the longer it can take for all the pieces to rebalance and stabilize around a new equilibrium. Today, the author doesn't know all that he already knows and doesn't yet have the visibility to see how the new domain competencies he's rapidly accruing are creating a different kind of role that could be even higher value.
