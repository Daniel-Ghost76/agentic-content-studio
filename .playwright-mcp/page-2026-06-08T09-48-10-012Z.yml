                        - generic [ref=e8977]:
                          - generic [ref=e8978]:
                            - text: I see many comments saying, "AI can't do X with 80-100% accuracy; therefore our professions are in good hands."
                            - paragraph [ref=e8979]: While I don't want to sound overly pessimistic, the models are improving at a rapid rate. If asked ~3 years ago where the state of the models are today, it would sound like sci-fi if answered, "the models are creating full MVP apps in ~30 minutes with one prompt".
                            - paragraph [ref=e8980]: The hurdles the models are facing now, like reducing hallucination rates, ensuring compliance, and keeping a clean codebase, do not seem far away from being resolved IMO. Fetching specific information is already partially done with various MCP servers / RAG.
                            - paragraph [ref=e8981]: I am, of course, a bit worried about the future of software engineers. If these quirks are resolved, where do their professions fit in the industry? Delegating tasks to the AI model? Unfortunately, this does not require years of expertise, which is a double-edged sword. Reviewing AI's output? Ask it to explain each line not understood.
                            - paragraph [ref=e8982]: I think we will see more waves of larger layoffs, similar to how human computers were replaced by digital computers. To some, doing complex mathematical calculations mentally is a fun task / challenge, but it is ultimately significantly slower and more error-prone than calculating with a computer. In the same way, I think hand-crafting code will be seen as a fun "challenge" and AI will be seen as the "modern-day calculator".
                          - paragraph [ref=e8984]:
                            - link "reply" [ref=e8987] [cursor=pointer]:
                              - /url: reply?id=48437681&goto=item%3Fid%3D48434312%2348437681
