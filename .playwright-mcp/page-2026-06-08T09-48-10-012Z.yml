                        - generic [ref=e13286]:
                          - generic [ref=e13287]:
                            - text: "> And who said it has?"
                            - paragraph [ref=e13288]: You've claimed that "right now, people effectively spend ~0% of their time entertaining themselves with their own music, art, writing, film, etc."
                            - paragraph [ref=e13289]: So I assumed that you don't spend your time with traditional creative pastimes or don't know any people who do. Otherwise I don't understand how you would come up with the ~0% figure.
                            - paragraph [ref=e13290]: "> You seem to imply that you can't have created any art ever in your life if you ever did anything with AI."
                            - paragraph [ref=e13291]: I did not say that you can't use any AI tools in the creative process, but anyone who has ever tried to create their own art will not confuse the verbatim output of AI models like Suno or Midjourney with actual art.
                            - paragraph [ref=e13292]: "> The human touch is not automatically genius,"
                            - paragraph [ref=e13293]: I never claimed that. The nice thing is that there is so much existing art/music out there that you can easily choose the things you like.
                            - paragraph [ref=e13294]: I understand that prompting Suno can be a fun pastime for some people, just don't confuse it with actual music or art.
                            - paragraph [ref=e13295]: "> Sorry, I've seen just as much thoughtless garbage from humans as from AI..."
                            - paragraph [ref=e13296]: Yes, there is lots of thoughtless garbage music made by humans, but all AI generated music is thoughtless by definition. AI models do not have thoughts or intentions, they are developed to mimick human thought and intent.
                            - paragraph [ref=e13297]: "> and the AI touch is not automatically derivative trash..."
                            - paragraph [ref=e13298]: Generating whole songs with Suno very much is. These models are designed to be derivative. AI tools can be used effectively and responsibly in the creative process, but only as a tool among other tools. Prompting Suno is not a replacement for actual music making or production.
