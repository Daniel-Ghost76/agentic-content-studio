                          - generic [ref=e21344]:
                            - text: My prediction is that the review / human in the loop part will become much bigger and more discussed.
                            - paragraph [ref=e21345]: Current transformer technology will either plateau or eventually we will get to that singularity bracket. (I was a skeptic once but all signs point there)
                            - paragraph [ref=e21346]: And this means models will eventually get better.
                            - paragraph [ref=e21347]: The main human value will be
                            - paragraph [ref=e21348]: "- intent (we call the shots of why and what, AI will take care of the how)"
                            - paragraph [ref=e21349]: "- taste (everyone now immediately identifies Claude designed landing pages, they all look the same, taste changes with time, and can’t be predicted)"
                            - paragraph [ref=e21350]: "- supervision, both before and after AGI, to ensure no accidental damage, no misaligned decision drift, or in the unlikely but still statistically possible case of AI going rouge"
                            - paragraph [ref=e21351]: Anything else (if we don’t plateau) can be eventually achieved.
                            - paragraph [ref=e21352]: Having that said, the fact AI can do it, doesn’t mean we’ll want AI to do it.
