                        - generic [ref=e11595]:
                          - generic [ref=e11596]:
                            - text: I always remember of the infamous Steve Jobs quote "Ideas are cheap". If execution is everything, and frontier LLMs solve execution, then ideas are the gateway to abundance now, but abundance alone does not guarantee "stickiness".
                            - paragraph [ref=e11597]: What I think is often overlooked is the human "Willingness" and "Care" of staying with the thing for the lack of a better term. What I mean by that is that a lot of people just don't care enough, or don't want to, build, maintain, and own things. Sure you can ship V1 faster, but will you remain on the grind?
                            - paragraph [ref=e11598]: I think a great example of what probably will happen is found in Suno, the AI Music thing. I don't know if y'all have tried it, but it now produces really good stuff. What's happening there? A lot of people play with their own little universe and get tired quickly, move away from it, and only a few prolific creators stay and turn it into a "job like" environment.
                            - paragraph [ref=e11599]: We may have shifted the scale and the economics of "delegation" and "execution" but I think there are still a lot of other factors to consider.
                          - paragraph [ref=e11601]:
                            - link "reply" [ref=e11604] [cursor=pointer]:
                              - /url: reply?id=48435486&goto=item%3Fid%3D48434312%2348435486
