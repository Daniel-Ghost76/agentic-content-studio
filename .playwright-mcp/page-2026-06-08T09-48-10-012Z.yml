                        - generic [ref=e21190]:
                          - generic [ref=e21191]:
                            - text: "I posted this elsewhere, but I think it still has a valuable insight to bring to the table:"
                            - link "https://halecraft.org/software-engineering-is-the-new-manufa..." [ref=e21192] [cursor=pointer]:
                              - /url: https://halecraft.org/software-engineering-is-the-new-manufacturing-engineering/
                            - paragraph [ref=e21193]: "> LLMs are regression-to-the-mean machines--they pull junior developers up, and drag senior developers down. Taming them requires trading the romance of 'code as craft' for the physics of manufacturing."
                            - paragraph [ref=e21194]: "The thing I don't know is: how do we decide which direction is most valuable? I can see arguments in both directions--quality vs quantity, essentially. I think there's a strong argument for the value of both:"
                            - paragraph [ref=e21195]: "- we need more quantity of software: for a long time, the ability to write software has been locked up, confined to a closed cabal of specialists"
                            - paragraph [ref=e21196]: "- we need more quality in software: we depend more and more on software in every aspect of our lives, mistakes are intolerable and should be avoided"
                          - paragraph [ref=e21198]:
                            - link "reply" [ref=e21201] [cursor=pointer]:
                              - /url: reply?id=48436429&goto=item%3Fid%3D48434312%2348436429
            - row "upvote epolanski 17 hours ago | | [–] I have not seen evidence that they are regression to the mean machines. I'm lucky to work with great engineers and their productivity and code quality has become even higher. Wish that wasn't the case, but it is, and that puts also lots of pressure on myself to work more and better all the time. It's exhausting. There are cons too, system's understanding sometimes is not as intimate, which in turn produces less \"gotcha\" moments that may lead to better design. There's less time to review PRs and make it a choral work. On the other hand way more refactors and experiments can be run, so again, code quality has improved just because if you have a hunch that something could be done better, you can test it for cheap. reply" [ref=e21202]:
