            - row "upvote spacechild1 14 hours ago | | | [–] This is really true for most music genres outside the pop mainstream. The idea of AI free jazz is just as absurd as AI punk. More generally, we think that music (and art in general) is a form of human expression and communication. The very idea of AI music just seems absurd, as it completely misses the point of what constitutes music as an artform. Why should I listen to something that has been produced entirely without human intent? Why should I prefer a cheap simulacrum over the original? reply" [ref=e12127]:
