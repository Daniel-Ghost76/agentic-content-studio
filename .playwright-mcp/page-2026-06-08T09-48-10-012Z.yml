                        - generic [ref=e21466]:
                          - generic [ref=e21467]:
                            - text: Based on what I've been seeing/reading online the past ~6 months or so, I think there's a self-fulfilling prophecy going on here.
                            - paragraph [ref=e21468]: Developers are concerned about jobs going away, but how often are they pushing back in their orgs about how AI works? In response to "are you using AI to move faster," how many are responding with "yes, but there are some things you should know..."?
                            - paragraph [ref=e21469]: If there's no pushback and just pure acceptance of stuff like tokenmaxxing, then what does anybody expect when the broader narrative around AI is that it can help a novice to grind out miracles (i.e., "holy crap, if this is what a novice can do, what can an expert do?!")?
                            - paragraph [ref=e21470]: Of course leadership is confused because (it seems) few are asserting expertise, saying "no," and stating a clear case as to why they're doing that.
                            - paragraph [ref=e21471]: The default excuse is "I don't want to lose my job" (which is a fair reaction to all of this, especially these days), but it's worth considering when/how that choice is actually just shooting future you in the foot later. It seems there's a broader trend toward compliance more than there is "you hired me to do this job properly, did you not?"
                          - paragraph [ref=e21473]:
