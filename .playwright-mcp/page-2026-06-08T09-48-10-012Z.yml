                        - generic [ref=e24931]:
                          - generic [ref=e24932]:
                            - text: While LLM's are beyond junior level at this point, they're still just that. I don't really agree that the first two pillars have been affected.
                            - paragraph [ref=e24933]: I've shared a story before that between now and 2 years ago a developer who solely relied on AI has produced the same hot garbage instancing system within the same time period. For example back in my day in 2 years I went from writing a system that struggled with few hundred players to one that could handle thousands and far beyond that. The person using AI 2 years ago wrote a system that didn't work and wrote a system 3 months ago that doesn't work.
                            - paragraph [ref=e24934]: Everyone is saying how great AI is, but they're missing that the driver is just as important AI wouldn't be able to achieve any of this without capable (often seniors) using it and giving it guidance. It's really a difference between "it works" and "it works without flaws".
                            - paragraph [ref=e24935]: Of course AI can produce things that also "work without flaws" with solved problems and someone "recreating" something that already exists with AI is not that special, a junior developer could accomplish the same thing given the time.
                            - paragraph [ref=e24936]: But I do agree that AI becoming part of performance reviews and all that is producing more productive developers which is going to drive the cost way down. In a way AI is stealing from a developers salary and giving it to the AI companies which is pretty ironic considering how cold developers seem towards artists.
                          - paragraph [ref=e24938]:
                            - link "reply" [ref=e24941] [cursor=pointer]:
