                        - generic [ref=e27360]:
                          - generic [ref=e27361]:
                            - text: This was a good summary. I feel similar. At this point I think 95% of the skills I've developed over the 2 decades are basically useless. Prior to 2023 I felt like every new skill only made me more employable, but now I don't really see any software skills that are safe from AI today. Even the ones that are very likely won't be in a year or two so there's no point in learning.
                            - paragraph [ref=e27362]: I've said this in other threads, but it concerns me how little the average person is preparing for what's coming right now... It seems people are making decisions as if their jobs and income are safe when in reality their entire profession could be gone in less than a decade. People in this comment thread saying crap like "yea, but the code LLMs write still isn't that good by my standards" are totally missing the trend. The fact LLMs are even one-shotting extremely technically difficult problems was something almost no one thought they'd be able to do by now a couple of years ago. Even I as someone who pushed back against this and thought they would become extremely competent within years am genuinely amazed at just how good they are. Trust me, regardless of your opinions, your job and career is at risk.
                            - paragraph [ref=e27363]: Another thing to understand is that if AI replaces workers in a variety of fields from SWE, accounting, customer support, graphic design, etc. Then it's likely going to be hard to fine other jobs to pivot into because when unemployment increases that significantly everyone will competing for the same limited number of jobs. Some will fine something, but most will struggle to find anything.
                            - paragraph [ref=e27364]: I hear a lot of people talking about how they'll just go into 'x' field if AI comes for their job, but realistically you'll need years of reskilling and you're assuming that in a world where other people are also losing their jobs, and where AI is touching ever more forms of work, that you'll easily be able to get a job in that other field. And I'm not saying that won't happen, just that this isn't as realistic or as safe of a bet as some people seem to think it is. You're also likely deluded about how hard it is to find work because you've been in software for the last decade.
                            - paragraph [ref=e27365]: Please, please, please, start preparing for what's coming. The economy is going to get extremely rough over the next 10 years. You need to be prepared to be without income for years, if not indefinitely.
