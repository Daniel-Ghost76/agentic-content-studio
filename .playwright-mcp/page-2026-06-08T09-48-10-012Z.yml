                        - generic [ref=e1851]:
                          - generic [ref=e1852]:
                            - text: Hmm, but AI isn't just a really-good tool, it's also doing creative work too. As an aspiring composer, music generators are in my opinion really quite good, and often matches what composers and song writers can do. So if you ask me does a person who creates music with gen AI miss out on the soul of creating music? In my opinion at least, for the most part, yes.
                            - paragraph [ref=e1853]: To write a piece of music, you're working at so many different levels, the analytical, emotional, and structural as well as drawing on years of training and experience. When a person with little (or even just a moderate amount of) music training generates a piece of music in a couple hours, are they actually a composer? I personally would say no. I mean it does take a good ear (which is important) to use a music generator well, but still, would say they are more of an editor or an evaluator or a practical critic of music instead of a composer.
                            - paragraph [ref=e1854]: Yeah, at what point in a discipline does the increasing skill of AI overtake the need for our contributions from the working being done? In music, it's happened already. Looks like it's happening in coding too.
