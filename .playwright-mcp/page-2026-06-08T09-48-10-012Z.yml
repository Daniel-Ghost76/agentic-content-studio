            - row "upvote caymanjim 15 hours ago | | | [–] This starts from a false premise. Ideas aren't cheap. Good ideas are expensive. They're expensive because you have to weed through all the bad ones to identify them, find a market, and turn them into a product. You don't know that from the start, which is why the landscape is littered with millions of dead projects from thousands of dead companies. Even if the execution were cheap and implementation were perfect, if the starting idea was bad, it's all been a waste. Ideas aren't cheap, because bad ideas are expensive and good ideas cost money to vet. reply" [ref=e12746]:
