                        - generic [ref=e27423]:
                          - generic [ref=e27424]:
                            - text: The fact the whole world is going down with me is of some help actually. I can't stop the world. There is no preparing for that. We'll figure something out and if not, then not.
                            - paragraph [ref=e27425]: My non-tech friends will not suddenly be able to run servers or oversee AI systems. They will come to me with their ideas and I will turn the crank. My role will probably be named differently, something like "Intent Manager" or "Architecture Developer" or whatever but I have a strong feeling much of it will basically remain the same. The politics, the egos, the personality differences, AI has changed nothing in that regard. The jocks will not suddenly sit in front of laptops prompting Claude to debug their MQTT setups. You can say AI will do that and sure it will, prompted by me. If AI will do it autonomously then we're all fucked and I don't care about my "career" by that point. It'll be survival of the species time.
                            - paragraph [ref=e27426]: Much of accounting could have been automated. A good friend of mine has been manually entering paper receipts and whatever for well over 20 years now and his work load has actually increased. It's all automatable, but there are so. much. more. levers. Possible != will happen.
                            - paragraph [ref=e27427]: I do agree it's not the time to empty your savings account. Get ready for some rough times.
