                        - generic [ref=e27331]:
                          - generic [ref=e27332]:
                            - text: At the risk of being voted down for stating an unpopular opinion, the problem is that faith is neither provably true nor provably false. That's what makes it faith, not science.
                            - paragraph [ref=e27333]: Even though you clearly believe very strongly that religion is wrong, that's not a scientific viewpoint because science doesn't and cannot disprove the fundamentals of religion. Taking it further, you can't actually prove anything is true with science, because fundamentally it is about making hypotheses and attempting to disprove them, and those that remain and can't be disproved you accept as "scientific truth". But many "laws of science", we have already disproved but we still use them as approximations because they are useful.
                            - paragraph [ref=e27334]: One final thought is that people frequently have conflicting internal world views. Some people cannot tolerate that, and require a consistent set of rules that govern their idea of the world, but the majority of people are comfortable with some degree of ambiguity in that. In general, the more rigid and coherent your worldview, the less likely you are to accept that it might be wrong, which is why many scientists devote their efforts to disproving other ideas they disagree with, rather than trying to disprove the things they believe themselves.
