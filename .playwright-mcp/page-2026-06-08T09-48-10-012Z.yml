                            - paragraph [ref=e18009]: And, in your (and GP's mind), that means the same thing as "LLMs can replace plumbers"?
                            - paragraph [ref=e18010]: "After all, I said:"
                            - paragraph [ref=e18011]: ">>>> When all human output is valued at the fractions of a penny per month of work, there is no future."
                            - paragraph [ref=e18012]: I mean, I know it's fashionable to not read the article, but are we all really responding without even reading the comments? Are two paragraphs well beyond the attention span of the readers here?
                            - paragraph [ref=e18013]: "Okay, lets go with that asinine comeback: What do you think happens when the only work left for humans to do involves 100% physical labour and 0% thought?"
                            - paragraph [ref=e18014]: How many plumbers does a society need? Electricians? Even in construction, you can automate almost everything away with cranes and similar.
                            - paragraph [ref=e18015]: Now imagine that all the doctors, all the office workers, all the warehouse workers, all the bankers, lawyers, teachers, ... basically any job that requires thought ... all those people are now joining the legions of plumbers.
