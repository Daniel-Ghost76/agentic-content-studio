                            - text: "> Both of these have been happening before the advent of LLMs"
                            - paragraph [ref=e25090]: I'm not sure about that. I read they are making better use of AI to accelerate building their businesses. Apparently, in China, people were not looking to work in corporations anyway, so they saw AI as a means to escape them.
                            - paragraph [ref=e25091]: "> The \"means of production\" means jack shit unless you have the capital to scale up rapidly"
                            - paragraph [ref=e25092]: There are people topping music charts without even having a brand; they just produce good music. There are people automating entire marketing pipelines to minimize capital expenditure, and there are people building niches for small crowds and making a good living out of it. Not everything needs scaling.
                            - paragraph [ref=e25093]: "> Why is it hubris to give a damn about you spend 40 hours a week doing, or to lament change when it works against your enjoyment of those 40 hours a week. God forbid people value their time in any way that isn't monetary."
                            - paragraph [ref=e25094]: If you enjoy writing loops and if/else statements, you can still do it, but the market won't pay you when there is a tool that does it faster. That is the nature of the domain. Have you ever thought about the jobs that software engineers automated? What do you think those people did? They adapted, learned the tools, and moved on. This is the first time we are seeing automation at this scale in software engineering, and the reaction of software engineers is exactly the same as those in other fields.
                            - paragraph [ref=e25095]: Adapt.
