                      - 'cell "torben-friis 14 hours ago | | | [–] >This is domain expertise - software engineers are not needed for that. Ofc often senior sws are expert in it, but they aren''t necessary. Our engineers frequently need to be on the loop with product and stakeholders: Due to real world messiness, many times the only true answer to \"how does this currently work\" is in the code. Enabling product and stakeholders to fetch that knowledge would be a giant time saver, so we''ve experimented with LLMs. I recommend you try this exercise: place a non technical person in front of a complex business'' codebase with an agent in between and get them to extract or shape business knowledge through it. I''m serious, it''s not a rethorical device, genuinely do try with a coworker or a friend. It will teach you a lot seeing how the way they approach the problem is different to yours. All our attempts failed miserably. reply" [ref=e11293]':
