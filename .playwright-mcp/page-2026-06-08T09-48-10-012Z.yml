                        - generic [ref=e16952]:
                          - generic [ref=e16953]:
                            - text: "> It's horrible to be a software dev right now, you've to deal with AI and lunatics."
                            - paragraph [ref=e16954]: Yes, yes, 1000x yes.
                            - paragraph [ref=e16955]: As a bit of an aside, I have been toying with the idea of adding some sort of second pass/security auditing/scaling offering to my consultancy for people vibe coding projects which wind up generating interest. (Not sure what the fuck else I'm going to do!) I have a few non-technical friends who have found themselves in this situation and there's a real need for it.
                            - paragraph [ref=e16956]: The aspects of it which I find daunting are the ones you've referenced, though. I imagine many people -- especially the ones who've built mobile apps for $300 in tokens -- are going to balk at the costs I'd have to charge for such a service. We're also now living in an era where everyone is an "expert" (lunatic) ... with just a little help from Claude/Gemini/Grok/whatever. I can already foresee people second guessing every suggestion, decision, line item, etc. I'd also be taking on a liability that'd be tricky to completely work around via legal language for any bugs or security issues which might/would inevitably slip through review. Ironic because nobody blinks when LLMs excrete those things.
                            - paragraph [ref=e16957]: But, anyways, circling back around. Yeah, trying to find work in this market has been a new exercise in frustration. AI is all anyone wants to talk about, it's driven hourly rates through the floor and most of the open gigs revolve around model training and carry an implicit expiration window for the trainer. It sucks and I really don't know what I'm going to do to keep my consultancy open going forward. (As signs of how desperate I'm getting, I recently signed up for Task Rabbit and am seriously considering applying for a job at Tractor Supply.)
