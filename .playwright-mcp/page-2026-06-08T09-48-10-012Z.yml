                        - generic [ref=e22290]:
                          - generic [ref=e22291]:
                            - text: Good question indeed, I think quality matters less these days because it's trivial for an LLM to increase code quality.
                            - paragraph [ref=e22292]: Quality is usually observed from a human perspective. But in my experience, codebases that humans would judge as "low quality" are actually fine for LLMs. They don't have as much trouble as we do with spaghetti code. They don't have problems with readability or obscure syntax, it's all perfectly fine for them. They don't care about indentation either.
                            - paragraph [ref=e22293]: Also it's really easy to increase the quality of the code base. You can just prompt to add unit test coverage and it will. You can prompt the LLM to handle edge cases better and it will (you don't even have to specify which, it helps, but it's optional). If you want to have better separation of concerns, just ask the LLM to have more separation of concerns and you'll have it. Documentation lacking? Just one prompt away. More robust build pipeline? You get the idea.
                          - paragraph [ref=e22295]:
                            - link "reply" [ref=e22298] [cursor=pointer]:
                              - /url: reply?id=48434717&goto=item%3Fid%3D48434312%2348434717
