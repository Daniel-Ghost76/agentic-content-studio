            - row "upvote mullenba 19 hours ago | | [–] I've consulted with some big companies on AI strategy. I tell them there are two approaches to AI. 1) Train AI to replace human work. This gives you 50% quality for 10% cost. 2) Train AI to assist human workers. This gives you 200% quality for 110% cost. Most companies will go with option 1, and it's a race to the bottom. Eventually, someone will go with option 2 and gather up all of the pieces and take over the market. reply" [ref=e20328]:
