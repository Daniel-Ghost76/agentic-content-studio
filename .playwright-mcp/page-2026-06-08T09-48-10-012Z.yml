                          - generic [ref=e18359]:
                            - text: indeed you never said it was worse. i asked a counter question without answering yours. so to answer your question, the state is comprised of men. men are inevitably selfish creatures who do not perform a behaviour unless it is judged to be in their best interests given the context. lots of people have the behavioural pattern of community encoded with fuzzy logic above 0.5, that is to say the majority of the time men will probably act in ways that account for the needs of others. but the majority of the time is not an exhaustive sample space and plenty of people will all too happily give the downtrodden their moniker, unless kept in line by a set of community enforced morals. a state based legal framework is secular and does not account for any morals. conclusively, without a set of morality to keep them in check via community enforcement, a minority of the population is enabled to exploit their community.
                            - paragraph [ref=e18360]: im sure you have an opinion on that viewpoint, but im still curious as to whether you have an answer to my question.
