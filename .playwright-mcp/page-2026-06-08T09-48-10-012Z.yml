                        - generic [ref=e3137]:
                          - generic [ref=e3138]:
                            - text: ">I'd still place a bet that the SOA models make _far_ less mistakes than humans."
                            - paragraph [ref=e3139]: "Genuine question: your top coder seems to be producing the most error-free code from your perspective, has the deepest knowledge of the architecture and codebase, and is faster on the trigger than the others."
                            - paragraph [ref=e3140]: But your top coder has proven and verifiable dementia, where they will confidently assume the existence of apis and code that do not exist, mix up the purpose of others and forget other things, and you can't predict when and how they will introduce errors into the system or the severity of such errors.
                            - paragraph [ref=e3141]: Are you really comfortable letting this person with dementia generate most of your codebase in the airline and health industry?
                            - paragraph [ref=e3142]: I also hope you have an iron-clad agreement that prevents the model provider from doing silent updates because all your evidence of correctness you collected thus far goes out the window in that case.
                            - paragraph [ref=e3143]: "Another genuine question:"
                            - paragraph [ref=e3144]: "You have witnessed a human coder and the AI you're using make the same important mistake. Assuming you do not have the time and resources to retrain, fine tume, and test your frontier model:"
                            - paragraph [ref=e3145]: Who would you trust not to make the same mistake multiple times in the future after you have warned them that their job depends on it, the AI or the human?
