                          - generic "2026-06-07T21:55:17 1780869317" [ref=e9003]:
                            - link "11 hours ago" [ref=e9004] [cursor=pointer]:
                              - /url: item?id=48438969
                          - generic [ref=e9005]:
                            - text: "|"
                            - link [ref=e9006] [cursor=pointer]:
                              - /url: "#48437681"
