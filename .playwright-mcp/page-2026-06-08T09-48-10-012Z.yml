                        - generic [ref=e12675]:
                          - generic [ref=e12676]:
                            - text: "> I always remember of the infamous Steve Jobs quote \"Ideas are cheap\". If execution is everything, and frontier LLMs solve execution, then ideas are the gateway to abundance now, but abundance alone does not guarantee \"stickiness\"."
                            - paragraph [ref=e12677]:
                              - link "https://x.com/chamath/status/2033385903520129161" [ref=e12678] [cursor=pointer]:
                                - /url: https://x.com/chamath/status/2033385903520129161
                            - paragraph [ref=e12679]: "> I think a great example of what probably will happen is found in Suno, the AI Music thing. I don't know if y'all have tried it, but it now produces really good stuff. What's happening there? A lot of people play with their own little universe and get tired quickly, move away from it, and only a few prolific creators stay and turn it into a \"job like\" environment."
                            - paragraph [ref=e12680]:
                              - link "https://en.wikipedia.org/wiki/Sturgeon%27s_law" [ref=e12681] [cursor=pointer]:
                                - /url: https://en.wikipedia.org/wiki/Sturgeon%27s_law
                            - paragraph [ref=e12682]: Sturgeon's law states, "Ninety percent of everything is crap". The adage was coined by American science fiction author and critic Theodore Sturgeon while defending the merits of the genre. Sturgeon observed that most works in any field were low quality. Therefore, science fiction was not uniquely inferior.
