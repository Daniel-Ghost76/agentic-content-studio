                        - generic [ref=e26277]:
                          - generic [ref=e26278]:
                            - text: If corporations really thought LLMs were a great cost-savings tool, then the obvious target for replacement are not the lower-paid staff, but the higher-paid staff - the ‘product managers and stakeholders’. That justifies token burn, replacing the 7- and 8-figure people, right?
                            - paragraph [ref=e26279]: But that’s not the real goal, is it? The goal is to inflate the stock value, take the cream off the top, and dump the whole business on the pension funds, maybe creating a too-big-to-fail scenario where the government steps in an bails out the industry as with the airlines during Covid.
                            - paragraph [ref=e26280]: This is why all the testimonials and narratives are so suspect - nobody knows what fraction of online posts were created simply to sell the narrative that LLMs are this incredible disruptive tool that will change the world, solely in order to create FOMO in the investor class.
                            - paragraph [ref=e26281]: In this particular case, I’d like to see links to samples of LLM created codebases for “PCI compliance, double-entry ledgers, escrows, reconciliation, payment lifecycles, bank transfer idempotency”. It should be easy to put an open-source LLM-generated version up on github, right? And if not, why not?
