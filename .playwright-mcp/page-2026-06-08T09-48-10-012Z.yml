                        - generic [ref=e9316]:
                          - generic [ref=e9317]:
                            - text: "> Nothing corroborated this. Performance on benchmarks has practically leveled off."
                            - paragraph [ref=e9318]:
                              - text: "[There is plenty of data to support the claim that AI continues to improve, even exponentially.]("
                              - link "https://epoch.ai/trends" [ref=e9319] [cursor=pointer]:
                                - /url: https://epoch.ai/trends
                              - text: )
                            - paragraph [ref=e9320]: As for benchmarks I feel compelled to remind you that as soon as a metric becomes a goal, it ceases to be a useful metric. The models optimise for solving the benchmark and we create new benchmarks to assess broader intelligence. As models converge on 100%, progress obviously slows. That doesn't mean intelligence isn't improving fast. It just means that that benchmark is being well served and we need other benchmarks to assess other forms of intelligence.
                            - paragraph [ref=e9321]: I would like to take your bet that we're near the top of the curve. I take the side of Geoffrey Hinton, the Nobel Prize laureate scientist known for his work on artificial neural networks. He believes AI is getting better even faster than he predicted. He estimates that every seven months AI becomes able to handle tasks twice as long.
                          - paragraph [ref=e9323]:
                            - link "reply" [ref=e9326] [cursor=pointer]:
                              - /url: reply?id=48442815&goto=item%3Fid%3D48434312%2348442815
            - row [ref=e9327]:
              - cell [ref=e9328]:
                - table [ref=e9329]:
                  - rowgroup [ref=e9330]:
                    - row [ref=e9331]:
                      - cell [ref=e9332]:
                        - img [ref=e9333]
                      - cell "upvote" [ref=e9334]:
                        - link "upvote" [ref=e9336] [cursor=pointer]:
                          - /url: vote?id=48443162&how=up&goto=item%3Fid%3D48434312
                          - generic "upvote" [ref=e9337]
                      - cell [ref=e9338]:
                        - generic [ref=e9340]:
                          - link "camgunz" [ref=e9341] [cursor=pointer]:
                            - /url: user?id=camgunz
                          - generic "2026-06-08T09:40:17 1780911617" [ref=e9342]:
                            - link "6 minutes ago" [ref=e9343] [cursor=pointer]:
                              - /url: item?id=48443162
                          - generic [ref=e9344]:
                            - text: "|"
                            - link [ref=e9345] [cursor=pointer]:
                              - /url: "#48437681"
                              - text: root
                            - text: "|"
                            - link [ref=e9346] [cursor=pointer]:
                              - /url: "#48442815"
                              - text: parent
                            - text: "|"
                            - link [ref=e9347] [cursor=pointer]:
