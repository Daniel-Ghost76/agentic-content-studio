            - 'row "upvote lqstuart 7 hours ago | | | [–] I really like your core point. I don''t know anything about Suno and that''s what people are picking at, but I''ll offer a supporting example from pre-LLM days: the number of people who were actually willing to dig through source code was nonexistent. I''ve worked in ML/AI since forever and I would say roughly 1 in 5 to 1 in 20 developers I''ve worked alongside were actually willing to just go to Github and look up why code might be failing and get to the bottom of it. The same is true for LLMs. You can get Claude to spew 2,000 lines of garbage in 15 minutes, but the number of developers actually willing to sit there and reason over the output and make the tweaks--often very minimal tweaks--that make it go from 90% correct to 100% correct are vanishingly few. And it''s typically just laziness and a lack of any kind of genuine interest in the field. reply" [ref=e12988]':
