                          - generic [ref=e18108]:
                            - text: Robotics aren't new. The LLM robotics trend (half of which are complete scams and the other half are vaporware) might be an even stupider bubble than the LLM programming bubble, though it's also a smaller bubble.
                            - paragraph [ref=e18109]: At least LLM programming bubble is applying language models to language tasks, even if the results are mixed. The LLM robotics bubble is doing what exactly? They're making videos of remote-controlled skinsuits doing mundane tasks inefficiently in a way that impressed investors. They're trying to exploit the ELIZA effect for physical movement.
                            - paragraph [ref=e18110]: I saw one sorting packages to put the barcode label on top. Do you know what's a better way to do that? You put a camera on every side, including underneath, so the barcode can be read from any direction. This scanner can work at line speed instead of being the bottleneck. This isn't new. And you sort packages into different buckets by having pneumatically activated wedges that swing out and push the package onto a different line. The bottle return machine at my nearest supermarket does that, I'm sure wannabe billion dollar VC funded startups can manage it.
