            - row "upvote adam_arthur 19 hours ago | | | [–] There's quite a large cushion for software salaries to decline before permanent structural unemployment were to set in. It's not really feasible for \"normal\" businesses to hire developers at current salaries. Tech companies will probably shrink in headcount, but all the non-tech kind of businesses can increase developer headcount. Current Tech salaries are far above other fields while requiring (used to) significantly less training or time investment to get into. Phase 1 is more likely that software comp will normalize with other professions, and more hiring will happen at the fringes rather than being concentrated in a few big companies. reply" [ref=e15399]:
