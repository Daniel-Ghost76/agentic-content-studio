            - row "upvote mattmanser 18 hours ago | | | [–] I think it's the same throughout startup software to be honest. It's just easier to point out when there's clear rules. Security, GDPR, backups, build pipelines, disaster recovery, most of it will be faked, half-heartedly done once or ignored entirely. Then there's the more abstract things like scalability, idempotency when integrating with external APIs, error recovery, accessibility, UX, etc. Almost always that sort of stuff will have been entirely ignored, or there will be a fig leaf over a real mess of misunderstood standards or manual intervention steps. Startup developers usually have to be generalists as they often wear many hats, so things that need deeper domain knowledge get done to a bare minimum. reply" [ref=e2567]:
