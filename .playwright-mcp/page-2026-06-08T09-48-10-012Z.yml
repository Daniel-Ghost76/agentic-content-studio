                        - generic [ref=e19062]:
                          - generic [ref=e19063]:
                            - text: "For context: I came from hardware, Linux, networking, telecoms, and datacenter infrastructure, not software development. I always wanted to go deep, but in practice my brain dragged me across many instead, which unintentionally made me very broad. I kept ending up in organisations where I was pushed back into such roles because its apparently where my \"value\" is."
                            - paragraph [ref=e19064]: I give that context because unlike a lot of you, I’m not a world class FAANG engineer and never will be. It is from this context all of my thoughts on AI flow. I work with people who are trying to use AI to produce work involving entire markets, roles, skillsets and technologies they don't even know exist, let alone understand.
                            - paragraph [ref=e19065]: "> I had the opposite thought."
                            - paragraph [ref=e19066]: Until I recently got pulled back deep into engineering despite not being hands on for close to a decade, so did I. I was pulled in not because of any pure technical capability but instead because it's been recognised the team requires more. The skills I thought served only to help me stay employed in any role in the most basic roles are increasingly turning out to be things other's do not have and are becoming increasingly important.
                            - paragraph [ref=e19067]: These are skills I always assumed crucial to “baseline competency” for everyone, but yet where a significant amount of them do not, and these individuals are now finding themselves in positions where they are less useful than me as a result. Many of them can not simply be acquired from AI either, and require years of active growth and practice.
                            - paragraph [ref=e19068]: "> Being a generalist was very useful to me 5 years ago. Now AI models have made everyone a generalist."
                            - paragraph [ref=e19069]: I think they could, but have not. Not at a scale required for me to have significant concern.
                            - paragraph [ref=e19070]: AI works as well as the context you can provide, and you don't know what you don’t know. If the context is shallow, so to will be the output, even when it looks convincing and that “looks convincing” part I believe is the most dangerous part.
                            - paragraph [ref=e19071]: As an example; I've been (recently) attached to an engineering team, despite last holding that title pre-2015, after AI assisted work contributed to a multi million dollar contract loss. A customer experienced an outage, it was "fixed" and everyone moved on. A month later another outage occurred of a greater scale. A huge amount of time was wasted doubling down on the original AI finding, because the actual root cause had not been identified or understood, because it had been "fixed". Turns out AI had identified and "fixed" a symptom, not a root cause.
                            - paragraph [ref=e19072]: I was able to identify and resolve the real issue because I had wider operational and infrastructure context the team lacked, but the damage was done. Trust was gone, the client lost, and layoffs will follow. Those layoffs will be “because of AI,” but not any "10x'ing" of productivity. Instead it will be because plausible but wrong work made it into production and hid a very real problem as a result.
                            - paragraph [ref=e19073]: That’s the issue with AI as I see it now. It generates answers that survive initial scrutiny while completely missing wider context leading to cases where more impactful but hidden problems are introduced.
                            - paragraph [ref=e19074]: "> That wide but not terribly deep skillset was immediately devalued by the AI models."
                            - paragraph [ref=e19075]: Perhaps “generalist” was the wrong word here.
                            - paragraph [ref=e19076]: Most "engineers" I have worked with are extremely deep in their area and surprisingly limited outside it. Even with AI, they struggle to move beyond their specialty because they lack broader foundations underneath not just modern infrastructure, but a range of areas equally important to the health of a business. My advantage has never been being the best engineer in the room, I knew early in my career I’d never compete with the engineer who can patch our kernel before upstream does, despite wishing I could.
                            - paragraph [ref=e19077]: What ended up mattering instead was becoming the "95% guy" across infrastructure, networking, systems, operations, business, customer success, and people management that allows me to work with people/organisations and ultimately connect dots in a way even the best engineers I have worked with can not. AI can help you develop skills in areas you don't have, but starting with most of it in areas in which people have exactly none, and where people seem extremely resistant to developing it with or without AI, has me significantly further ahead in the curve. Ironically, at least in my experience so far, AI has made that more valuable, not less.
                            - paragraph [ref=e19078]: "> they make poor code"
                            - paragraph [ref=e19079]: I consider this to be the least important part. We have testing, review, and process for that.
                            - paragraph [ref=e19080]: I believe (and have instructed juniors as such) that the real value of valuable technical people has never been producing rockstar code, or being a clone of Linus. It's in having a deep foundational understanding of the building blocks underpinning the now endless layers of abstraction, understanding consequences, tradeoffs, failure patterns, business impact, customer communication, customer wants and needs, and ultimately I guess to sum it up, organisational reality.
                            - paragraph [ref=e19081]: This feels more important than ever when they can generate plausible looking technical output instantly that they may be able to validate, but equally produce plausible output in a huge range of areas they absolutely can not, but for which their successes in code have led them to believe they can. Because they underestimate what they don't know and in fact often assume they know far more than they do with no real basis for such a belief.
                            - paragraph [ref=e19082]: On the whole, I think I would end my thoughts like this.
                            - paragraph [ref=e19083]: For years I lived with the stress that "rockstar" engineers would lead to me eventually becoming irrelevant, much in the same way I might fear AI. So far, being 95% across customers, leadership, sales, support, engineering, and business strategy without losing the technical depth underneath it has meant this fear was unfounded and in fact put me ahead of them. I believe I am not isolated in this, and that in fact we will see more of it.
                            - paragraph [ref=e19084]: All else aside, my roles as of the last decade often require me to be in the room and working with humans. AI has not changed this, and there is no current indication it will. The requirement will be that I continue to remain in the room, only now with AI. This is for many reasons including regulatory, because portions of what I do involve systems that if mishandled could lead to more than just a loss of profit. There may be less of these roles, but as it stands I see nothing to indicate they will not exist.
                          - paragraph [ref=e19086]:
                            - link "reply" [ref=e19089] [cursor=pointer]:
                              - /url: reply?id=48440960&goto=item%3Fid%3D48434312%2348440960
