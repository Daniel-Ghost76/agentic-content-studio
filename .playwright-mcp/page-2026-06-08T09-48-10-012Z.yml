            - row "upvote visarga 14 hours ago | | [–] > All my finance and payment domain expertise, all the debugging intuition and distributed system knowledge earned through hours of sweat and tears, is now promptable. In ML it was even worse, we had to throw away a decade of experience, made irrelevant by the new approaches. Even the most revered activity - designing new architectures - became too expensive to do in real life. Fine-tuning models is what we do now, prompting and evals. Like 90% of what we used to learn is no longer needed. And yes, LLMs can do most new ML activities too, they just need light supervision. I am sometimes ashamed to admit I have stopped coding 12 months ago and never wrote one more line, that after 35 years of coding manually. But I also think we will never be without LLMs again, so no point in preparing for 2016 in 2026 reply" [ref=e20900]:
