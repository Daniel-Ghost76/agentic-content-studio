                        - generic [ref=e24962]:
                          - generic [ref=e24963]:
                            - text: Software engineers with low self-esteem who built their entire identity as mechanical cognitive workers are having an identity crisis and spreading FUD.
                            - paragraph [ref=e24964]: Currently, LLMs are nothing more than amplification tools that require significant steering. If you think your job is mainly to take input from POs or managers, translate it into if/else statements and loops, and review PRs, then you never really understood your role. Software engineering—for those who went to university and studied it—is fundamentally about complexity management and cognitive automation. People in the field, or at least those with some math background who studied software engineering properly, understand that it's all about managing complexity; current tools are nowhere near replacing a software engineer. What they call "taste" is imagination, creativity, embodiment, a more intuitive understanding of context, and yes, superior intelligence compared to current AI. However, AI and LLMs are excellent at mechanical work and mimicking human intelligence, so use them for what they are, and stop whining.
                            - paragraph [ref=e24965]: Going forward, the world is ever-growing in complexity, and automation will become widespread everywhere. LLMs just unlocked another level. So basically, cognitive work will be automated—perhaps up to 90%—until the next breakthrough (if ever). You can sit and cry, or you can learn the tools and help shape the future.
                            - paragraph [ref=e24966]: Software engineers can automate the entire economy now, including the executives, yet they just sit there whining and crying. This is a self-esteem, confidence, and identity issue more than anything else.
                          - paragraph [ref=e24968]:
