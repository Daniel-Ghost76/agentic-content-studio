                        - generic [ref=e10159]:
                          - generic [ref=e10160]:
                            - text: In my own (admittedly limited) experience, 2 employees in my company (that had no programming knowledge or experience) have vibe coded apps that simplify their daily roles. The apps basically automate a flowchart of steps where multiple people need to submit certain pieces of info and as they do, a "project" moves through stages and the employees get notified on Telegram.
                            - paragraph [ref=e10161]: The app really is just several simple forms with some if/else logic, but claude code allowed them to get the app up and running and deployed on vercel's free tier, and it's Good Enough™ to save them an hour or so each day lost in messaging and chasing up things.
                            - paragraph [ref=e10162]: I don't think anyone would ever have targeted an app for sale to them, and it would have been hard to twist some sort of flow management app and integrate it with Zapier or something to handle external api calls. With claude code they could just tell it what they wanted and solve their very niche issue. That's why I think that even though LLM coding has improved so much you might not see more software for sale - it's easier for people to just...make their own software.
                          - paragraph [ref=e10164]:
                            - link "reply" [ref=e10167] [cursor=pointer]:
                              - /url: reply?id=48442836&goto=item%3Fid%3D48434312%2348442836
