                        - generic [ref=e21885]:
                          - generic [ref=e21886]:
                            - text: "The supercharge bit missed an important fact: that strategy is very temporary. Getting expertise in software development takes a long time. Getting expertise in these LLM tools takes a lot less time— the combination of LLM expertise and dev expertise is the useful part. If LLMs make working developers, say, 35% more efficient, that’s going to be many thousands of people out of work, many of them being the most experienced and expensive we have. It’s not like those people are all going to give up immediately and become DoorDash drivers — they’re going to fight tooth and nail to get a job that uses their existing hard-won expertise. That means they’re going to level up their LLM knowledge, be willing to work for a LOT less money, and bring down everybody’s wages in the process. Companies don’t pay people based on the amount they bring to the company — they pay people based on the going market rate. That’s about to be a whole lot lower. So no matter how much you supercharge, you’re only buying yourself a little while until the labor market catches up. Nobody in development is safe. The entire field was so busy seeing how fast they could saw branches off of a tree that they didn’t realize they were standing on the wrong side of the cut, and the business side of the industry could not be happier about it. You’re basically working as a manufacturing engineer in the 90s US specializing in moving processes to offshore facilities. Probably felt pretty clever for a few years until they got the pink slip."
                            - paragraph [ref=e21887]: Honestly, the only hope that the dev field has is this all being so economically inefficient that the industry as we know it collapses after the VC subsidies run out, and we’re going to pivot towards much more reasonable interventions with local models and such.
