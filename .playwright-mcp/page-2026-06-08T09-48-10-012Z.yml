            - row "upvote Cherryontop11 10 hours ago | | | [–] See my issue with these comparisons is that it always compare AI to 100%. When 100% does not exist. Most software out there has issues, bugs, compliance problems, security weaknesses, scaling, redundancy, availability issues...etc. A lot of this is not actually related to how good or bad software engineers are. It's about costs and time to ROI. Greed is an issue too. So people seem to have this idea that software created by humans is perfect (its not). And that deterministic (human created software with if/then) is alway going to be better than probabilistic (LLMs). Which in a perfect world is the case, but we live in a capitalistic world where this is not the case. reply" [ref=e10016]:
