                        - generic [ref=e10969]:
                          - generic [ref=e10970]:
                            - text: My career path is suprisingly similar to the author's. Weirdly enough, what he takes as the first pillar to fall is the one I see most undamaged currently.
                            - paragraph [ref=e10971]: "LLMs routinely fail at our business specifics: Local tax regulations, particularities of the accounting process, specifics of our ledger implementations. They're great at refactoring, translating between languages, tracing bugs on existing code even, but there is always many things subtly wrong iterating and expanding our domain."
                            - paragraph [ref=e10972]: This might be because the companies I worked for happen to be tackling complex domains precisely for moat-building reasons. They stay in business explicitly because there's not a book out there you can read to build a clone, the knowhow stays inside.
                            - paragraph [ref=e10973]: Also, a fintech whose managers recommend speeding up design docs with AI sounds way too careless to be in the money handling business. It's way, way too easy to end up with millions incorrectly allocated, particularly if you deal with high volumes of small transactions. These bugs are always a bitch to deal with because correcting the logic is just step one, you then have to correct all the wrongly calculated data in immutable DBs, move around the red tape and client comms, and your fix is bound to become a gotcha that new features and observability have to take into account ("remember that there's a bump in the data in february 2 because we had incident X".)
                          - paragraph [ref=e10975]:
                            - link "reply" [ref=e10978] [cursor=pointer]:
                              - /url: reply?id=48434590&goto=item%3Fid%3D48434312%2348434590
            - row "upvote odeono 17 hours ago | | [–] This. Once you're building something that genuinely hasn't been built before, LLMs cannot be trusted with any architectural decisions. I'm building a product based around various physics simulations, so it's purely first principles, but without active research, thinking, and challenging, it produces computational code literally hundreds of orders of magnitude slower WHILE implementing absurd fallbacks and shortcuts that effectively result in a useless calculation. This is the case perhaps 95% of the time. Oversight is very important, and architectural thinking cannot yet be outsourced, only execution. reply" [ref=e10979]:
