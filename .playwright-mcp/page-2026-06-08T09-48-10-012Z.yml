                        - generic [ref=e17673]:
                          - generic [ref=e17674]:
                            - text: Sure, but those are cherrypicked cases where a technology became obsolete. There are many counterexamples of decades-old technologies that are still actively chosen for greenfield work today, in 2026.
                            - paragraph [ref=e17675]: SQL was first released in 1973. More new SQL is being written today than ever.
                            - paragraph [ref=e17676]: C++ (1985) is the de facto standard implementation language for web browsers, JavaScript engines, networking stacks, telecommunications, video games, high speed trading, CAD/CAM, video rendering and editing, audio processing, filesystems, databases, hardware drivers, automotive, aerospace, and robotics, among others.
                            - paragraph [ref=e17677]: Is Rust making inroads? Sure, and it's a tiny fraction of C++ still. It's a long ways from being the standard.
                            - paragraph [ref=e17678]: Likewise, Python is often cited as the "AI language," but that's on the surface -- CUDA, tensor libraries, inference languages, GPU kernels, compiler stacks, and so on are usually C++.
                            - paragraph [ref=e17679]: Then there's C -- introduced in 1972. Still widely used for greenfield in kernels, device drivers, embedded systems and microcontrollers, filesystems, firmware, network stacks, cryptography, databases, compilers.
                            - paragraph [ref=e17680]: LaTeX, MATLAB, Erlang, Verilog, PostScript, Lisp (including Scheme and Clojure), shell scripting (and the UNIX paradigm itself)... the list of old tech that still sees new projects in 2026 goes on.
