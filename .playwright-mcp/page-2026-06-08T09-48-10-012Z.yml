            - row "upvote ddingus 9 hours ago | | [–] Seconded. If there is any skill in consistent demand it is the ability to wrap your head around the new work, new processes, new people, whatever it all may be. For me, understanding and development of this skill into a keen tool happened while I worked as a prototype mechamic. For those unfamiliar, a prototype mechanic does what it takes to make often demanding parts on consistently short timelines week after week. Metals, plastics, you name it. One gets good at ramping up on processes, machine tools, materials. And after doing that for a while, you end up able to very rapidly absorb new info and understand work far more quickly and accurately than many. Anyone can start this. Just get curious and build things. Then build more things. Share your builds and build things other people want made! reply" [ref=e13430]:
