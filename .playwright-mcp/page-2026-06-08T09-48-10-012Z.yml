                          - generic [ref=e20319]:
                            - text: I've come across lots of novel uses, though. I've seen non-technical people in law, education, hr, all spin up interesting projects/workflows which have helped their jobs/lives. The most interesting was a teacher who's dropped powerpoint, and is creating interactive lesson experiences; mainly presenting the content through popular games and creating engaging activities to apply the content. A recent one was a mock UN summit presented like a game of Civ with territory mechanics. Absolutely zero tech background, just curiosity.
                            - paragraph [ref=e20320]: "Once people get over a few hurdles, things like: >tech's too confusing >$20 is a lot of money to spend on a subscription >AI is just a fancy search engine >AI will do all the work for me"
                            - paragraph [ref=e20321]: You start unlocking a fair bit of creativity in people. I mean, all this is brand new stuff even for tech-savvy people. It'll take a while for the genuinely useful uses to dissipate out into the maasses.
                            - paragraph [ref=e20322]: Not everything has to be a billion dollar business.
