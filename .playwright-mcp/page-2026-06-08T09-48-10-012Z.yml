                        - generic [ref=e16532]:
                          - generic [ref=e16533]:
                            - text: My comment was about the fact that even if you're laid off, you're more likely to find success in artisanal software than artisanal woodworking. That statement is not an assertion that you're guaranteed success, just that it's more likely to sustain yourself than woodworking is.
                            - paragraph [ref=e16534]: Layoffs also don't really tell you anything. Is it actually LLMs that are causing layoffs or is it deteroriating economic conditions and uncertainty amidst war, oil shocks, etc.? Is it junior employees being laid off, or seniors? If it's the former, someone with 10+ years of professional experience might not have reason to be concerned. I happen to believe that, LLMs or not, the software development field already had far too many jobs, employing a large number of clueless people who contributed somewhere between zero and negative value to their organizations, and that it was overdue for a correction anyways.
