            - row "upvote est31 17 hours ago | | | | [–] A new generation of AI companies is out there to take over blue collar jobs as well. Check recent YC batches. Software engineering was a nice target because inputs and outputs are just data and you don't need to figure out robotics. But idk, 3 years ago it seemed illusory (at least for me) that LLMs could take over software engineering, but now here we are. They are still not 100% there yet (software engineers still have jobs), but we are getting ever closer. Companies are in the process of figuring out robotics, and even if it's not figured out, then we might introduce a gig-ified blue collar economy where an unskilled, underpaid gig worker implements instructions by AI. Plus a lot of blue collar work already today involves robots (cranes, excavators, trucks, etc). reply" [ref=e18053]:
