            - 'row "upvote petesergeant 4 hours ago | | | [–] When did you last try this? Here''s a prompt for you: > It''s really important to me you make sensible decisions here, and don''t bother me with the small stuff. I want a plant-watering app me and my wife can share, that shows who watered which plants in our house. I''ll deploy this on my home server with Coolify. The app should be attractive, work both on desktop and mobile. We have a bunch of cases where we have multiples of one plant type. We''ll need separate users, but don''t go overboard with auth. I want to impress her, so let''s lean on the side of more rather than fewer, features, but I don''t really wanna run anything that won''t just fit in a single container with some persistent storage. We''re the only two users who''ll ever actually give this a go. Visually attractive is important to me. reply" [ref=e10496]':
