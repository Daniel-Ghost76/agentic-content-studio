                          - generic [ref=e18422]: part of me already knew you believed that, not sure why i had to push back. its a valid point that secular society does to a degree encode morality. i believe the morals encoded by religion were formed from trial by fire and are probably more likely to result in continued human existence as opposed to whatever anybody came up with in the last N years, but im sure we shall find out shortly just how well different schools of morality work out on that front. i dont think the common refrain is accurate, however it does point to the truth i alluded to (that a significant non-majority of humans will always behave deleteriously to those around them unless forced to behave differently). i do have an issue with holding beliefs that shape morality, however this is a seperate discussion and bringing up examples like 1 religion accounting for 95% of blasphemy related executions in the past 50 years is just going to get me muted, even with the intentions to demonstrate examples of beliefs shaping morality in ways i dont agree with personally.
