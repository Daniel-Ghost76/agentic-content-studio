                        - generic [ref=e9009]:
                          - generic [ref=e9010]:
                            - text: "> the models are improving at a rapid rate. If asked ~3 years ago where the state of the models are today, it would sound like sci-fi"
                            - paragraph [ref=e9011]: Absolutely true, many things will continue to improve in significant ways. However, if we look at the modern history of rapid disruptions driven by technology (a side interest of mine), persistent patterns emerge. Similar to avalanches or flash floods, such periods of very rapid disruption are often triggered by one or more significant breakthroughs in certain technologies. Early rates of change tend to be fast and furious but eventually begin to taper as recently unlocked low-hanging fruit is harvested and those racing through newly found terrain encounter all-new significant barriers and points of friction. Early in such periods, extrapolating the recent extraordinary rates of change forward has poor predictive power. Sudden extreme bursts tend to regress back toward the long-term trend line.
                            - paragraph [ref=e9012]: Arguably, the current disruption in LLMs can be traced to post ~2010 research slowly building to the 2017 transformer paper and the adjacent work it quickly inspired. So today is, arguably, mid or late-ish in the LLM rapid burst phase. The rate of fundamental, broad-based breakthroughs lifting all LLM applications has clearly slowed with many of the most impactful recent discoveries being in scaling, optimization, tuning and productization toward specific domains. That doesn't mean there can't be another transformer breakthrough tomorrow but, historically, black swans rarely travel in flocks.
                          - paragraph [ref=e9014]:
                            - link "reply" [ref=e9017] [cursor=pointer]:
                              - /url: reply?id=48438969&goto=item%3Fid%3D48434312%2348438969
            - row "upvote thomasahle 4 hours ago | | | [–] > The rate of fundamental, broad-based breakthroughs lifting all LLM applications has clearly slowed with many of the most impactful recent discoveries being in scaling, optimization, tuning and productization toward specific domains. To me it definitely feels like it's still accelerating, with the most impactful recent discovery being RL training reasoning models (late '24, early '25). There's an interesting article called \"sigmoids won't save you\" https://www.astralcodexten.com/p/the-sigmoids-wont-save-you which argues that (unless you have privileged information) you should always assume a process will continue about as long as it’s continued already. (Lindy's Law) With that in mind the current disruption should last another 10-15 years (assuming it started in '10 or '17.) reply" [ref=e9018]:
