            - 'row "upvote MetaWhirledPeas 7 hours ago | | [–] I''m probably a good candidate to direct a platoon of agents. I''m a generalist and I think in terms of business requirements. But I''m not sure I want to. Coding captures my imagination, and directing agents just plain doesn''t. Or maybe it''s more than that: maybe I''m off-put by people who have no need to be in the immediate AI race spending a lot of money to get ahead without asking what near-term problem they are trying to solve. It''s depressing and makes the whole field more depressing. My advice for them (if they cared) would be that soon all this will be even more batteries-included, to where any dunce can dial up a production-ready app with a sentence. There''s no need to rush; when it happens you''ll be better off not having wasted millions trying to be on the bleeding edge. reply" [ref=e20872]':
