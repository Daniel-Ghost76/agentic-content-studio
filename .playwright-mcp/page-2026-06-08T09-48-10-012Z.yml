                        - generic [ref=e8734]:
                          - generic [ref=e8735]:
                            - text: In software dev, for a big finance corp
                            - paragraph [ref=e8736]: I like your comment, want to try to expand on it
                            - paragraph [ref=e8737]: Comment long but there is a TL;DR at the bottom
                            - paragraph [ref=e8738]: My theory is that there are 4 areas to domain knowledge worth taking about here - there may be more but I like 2*2 matrices
                            - paragraph [ref=e8739]: 1) explicit internal requirements - core of how the how the app should work towards achieving your business objectives - code expresses what should be done and to a pretty large extent, why it should be done - from business unit requirements - we are building a tool to do “X”
                            - paragraph [ref=e8740]: 2) implicit internal requirements - core of how the how the app should work towards achieving your business parameters and constraints
                            - paragraph [ref=e8741]: eg profit = selling price - ( total of costs )
                            - paragraph
                            - code [ref=e8743]: "- code expresses what should be done but really can’t express why. At best it is in the comments"
                            - text: eg if market is EU then tax = 30% (or some value for a table), AI can see what is being done but rationale is not explicit
                            - paragraph [ref=e8744]: 3) implicit internal requirements - core of how the how the app should work towards achieving your business constraints - code expresses what should be done but really can’t express why. At best it is in the comments
                            - paragraph [ref=e8745]: eg if item is “rocket” , shipping = $1m ( we only make rockets in Antarctica and shipping from there is $1m)
                            - paragraph [ref=e8746]: 4) implicit external requirements - core of how the how the app should work towards achieving your business constraints - code expresses what should be done but really can’t express why. At best it is in the comments
                            - paragraph [ref=e8747]: eg if item is “rocket” , add a 3 month gating stage to get approval from government to sell the item and do not collect payment till gating approved - AI can see the code but has no idea why it has to be done
                            - paragraph [ref=e8748]: These come from partners, regulation, compliance, auditability etc
                            - paragraph [ref=e8749]: So, my theory
                            - paragraph [ref=e8750]: AI can be good at the explicit stuff trivially (1, 2) but cannot be good at the implicit stuff (3,4)
                            - paragraph [ref=e8751]: It might be able to figure out implicit stuff needs to be done but will probably not be able to figure out why it needs to be done and it will definitely not be able to definitively figure out edge cases for when to do it / not do it
                            - paragraph [ref=e8752]: As long as you focus on implicit stuff, you will be fine for a little bit
                            - paragraph [ref=e8753]: TL;DR - become good and keep being good at being the person who understands the implicit external drivers of software dev
                          - paragraph [ref=e8755]:
                            - link "reply" [ref=e8758] [cursor=pointer]:
