            - row "upvote spacechild1 13 hours ago | | | [–] > Right now, people effectively spend ~0% of their time entertaining themselves with their own music, art, writing, film, etc. First, the 0% figure is not true. People do write stories, play instruments or draw pictures. Second, everybody who really feels a desire to express themselves creatively has akready been able to do so. Nothing was stopping you from writing poems, drawing pictures or picking up an instrument. Recording music has never been so easy. The \"problem\" is, of course, that it takes some effort. LLMs seem to provide a convenient shortcut, but you effectively skip the whole artistic process. IMO it's better to either engage with existing great art or make an honest and humble attempt at creating your own art. You will learn so much more about music by trying to learn the piano or guitar than by prompting Suno. reply" [ref=e13198]:
