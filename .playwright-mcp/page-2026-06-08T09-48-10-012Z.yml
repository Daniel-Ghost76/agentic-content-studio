                            - text: "> And then I started realizing: all the knowledge I have accumulated over the years: the trade-offs between implementations, how acquiring works, how to structure idempotency to prevent double-charges, everything, was becoming useless."
                            - paragraph [ref=e27640]: It’s not useless, at least not yet. And the fact that you recognize this puts you way ahead of the typical HN user constantly crying about how AI could never
                            - paragraph [ref=e27641]: What’s going to make you a good AI-augmented engineer is going to be treating AI like a good partner
