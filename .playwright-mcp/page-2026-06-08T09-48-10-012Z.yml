                        - generic [ref=e21312]:
                          - generic [ref=e21313]:
                            - text: I sense FUD in the OP article towards AI, and we have similar article every week on HN now it's starting to become repetitive and tiresome. As of now this OP article is close to 1000 points and 1000 replies. Apparently this FUD seems to resonate with most people at HN, naturally so.
                            - paragraph [ref=e21314]: Ironically the entire blog title is the "human in the loop", is probably the biggest counter argument for this FUD. The AI will never ever be concious and responsible, and to function and govern properly in the universe you need to be concious. AI I repeat will never ever becomes one. Not even in the popular fictional Star Wars movie franchises where you can have cute robots but they all devoid of the conciousness for the ever powerful force. Heck even the clones cannot control and balance the force, the Star Wars ultimate conscience.
                            - paragraph [ref=e21315]: ">Of course, this is good for brilliant engineers that never had the chance to get deep into the domain and now have better chances at getting a job, but it's also sad to think that other brilliant engineers that spent their lives collecting domain knowledge are now competing on the same lane."
                            - paragraph [ref=e21316]: Actually overall it's definitely a very good thing for humanities. For example, currently it's very difficult to become a medical specialist and most medical students just stop at GP. But globally there are severe shortages of medical specialists for example typical cardiologists to patients ratio in developing countries is about 100,000:1, and for neurologists it's even worst.
                            - paragraph [ref=e21317]: Let's say with AI enabled tools and LLM now these GP can upgrade themselves to become cardiologists easier than before. Let's say due to AI/LLM suddenly there's a big jump of the ratio to 10,000:1 or 10x incraese and improvement in the number of cardiologists without degrading much of the quality of services. Imagine if the typical waiting time for important and necessary procedures like angiography now is reduced to merely days or weeks rather than several months or up to a year. Thus naturally the salary of cardiologists will be not be as high as now, but they still will be compensated handsomely. But as humanity do we really care the cardiologists family just live in semi-D landed houses instead of bungalows, not much me think.
