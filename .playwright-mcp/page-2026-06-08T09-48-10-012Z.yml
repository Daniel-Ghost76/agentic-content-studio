                        - generic [ref=e19505]:
                          - generic [ref=e19506]: There are lots of positives that have resulted from using AI in software engineering. (1) No more long repetitive text editing sessions. I.e. changing namespaces or replacing deprecated APIs with the "correct" ones. AI will make nearly perfect text modifications with ease. (2) No more bike-shedding code reviewers nitpicking over every tiny coding decision. I.e, "you should use std::format instead of std::stringstream". AI will match the existing set of nitpicks so you don't have to. (3) Average Joe's and Jane's can craft applications by just talking to the computer. This might inject a freshness to the current state of software. Currently, we are all forced to use the same bloated applications like Word, Excel, Jira, and Photoshop. We are currently forced to deal with the same set of monopolistic SW companies. Now average folk can solve problems and avoid dealing with Microsoft for a spreadsheet program.
