            - 'row "upvote Applejinx 15 hours ago | | | | [–] Suno''s incapable of making psytrance, which is mind-boggling as that is an intensely repetitive, machine-like genre that should be water off a duck''s back to produce. The problem is that it''s doing it by diffusion techniques, so all its high percussion is totally vague and indistinct. Hell, it can''t even do a decent psy kick because that too is unspecific and you can''t have a psy track that is vague and blunted. Turns out you can have a production that is hollow, weak and devoid of what makes purely synth machine tracks. It can''t get trancey in a serious way because it''s not capable of being sharp enough. Got an example of the genre done properly: https://www.youtube.com/watch?v=Va1KBtI81TY or alternately you could just look up some Infected Mushroom early tracks :) reply" [ref=e12034]':
