                        - generic [ref=e16088]:
                          - generic [ref=e16089]:
                            - text: It is fairly obvious that the majority of people who buy software (>99%) don't really care how it's built. They care a lot about the outcome of using it, they care a little bit about whether there are bugs or not, and they care about the cost a lot, but beyond that nothing seems to matter to the purchaser. Even obvious things like whether or not there are tests, documentation, SLAs for fixes, or backwards compatibility between versions don't really seem to matter much.
                            - paragraph [ref=e16090]: That doesn't mean you couldn't carve out a niche providing hand built software to people it does matter to, because the software industry is large, but saying 'zero percent of the market isn't willing to pay for it' isn't really wrong. It's just a rounding error that does care.
                            - paragraph [ref=e16091]: (One massive caveat though ... the argument assumes that 'hand built' means 'higher quality than AI-assisted', and that's probably not true for >99% of developers.)
