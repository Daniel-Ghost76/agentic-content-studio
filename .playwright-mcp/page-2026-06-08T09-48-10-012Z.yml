                        - generic [ref=e12614]:
                          - generic [ref=e12615]:
                            - text: Suno is a good example. I've written lyrics for a lot of songs and then "produced" them with Suno, a process that involves dozens to hundreds of remix/cover/extend revisions or a lot of time in their editor to get it sounding the way I want it to. The songs are songs that I like and will listen to in my playlist but they haven't gotten much traction on Suno's algorithm. I haven't tried to promote them much elsewhere either but when I have posted them they get a few likes at best. I'm not disappointed because I was creating the music for myself and just sharing it as a side effect but what I take away from this is that getting people to pay attention to and enjoy something that you've created takes a lot of work. You have to market it, get it in front of them, get them to pay attention to it and I'm convinced you also need to give them a reason to like it by associating it with something whether that's a video, a story, a persona or some other vibe. If you want it to "stick" you need to do all of that over and over again for the same audience so that they learn it.
                            - paragraph [ref=e12616]: That is what takes determination and why you have to really care about the thing you are trying to sell to people. You have to stick to it before they will stick to it.
