                          - generic [ref=e14266]: This is pretty much how I've been operating. While the C-suits have been always encouraging everyone- technical and non-technical folks alike- to use AI, the ask from my manager and skip level has always been for deterministic output. Before last December or January I was mainly using LLMs for autocomplete, whereas now it looks more like "given this input write script to generate this output", and after some corrections, "summarize/update this session into a skill". Script for future humans, skill for future agents.
