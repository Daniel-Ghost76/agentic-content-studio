                            - paragraph [ref=e21013]: However most people will have 10x times uplift in purchasing power compared to today so their relative poverty will be ridiculous for us to call it the poverty but they will still think they are poor and troubled.
                            - paragraph [ref=e21014]: Generally I don’t think it will be utopia for the people living in that moment but if you look from medieval times at today it looks like utopia for serfs from the past. You however wouldn’t call it an utopia because your standards grew as fast as your purchasing power.
                            - paragraph [ref=e21015]: I think that rich and poor will be separated by accessibility to anti age treatment and other bodily improvements.
                            - paragraph [ref=e21016]: The tragedy of the poors in the future will be living measly 80 year old life like a today millionaire and that will be considered lower class. Those people with wrinkles we don’t want to look at because of uncomfortable pangs of guilt.
