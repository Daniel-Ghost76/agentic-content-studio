                        - generic [ref=e25583]:
                          - generic [ref=e25584]:
                            - text: One other thing I find it is bound to happen is that this domain knowledge you speak of is just going to shift towards LLM domain knowledge.
                            - paragraph [ref=e25585]: Look at prompt engineering, and how quickly it became a hot thing. Does everyone know to steer their AI well? There's only so much a harness can do for you once you start attempting to one shot with a single sentence of 4 words.
                            - paragraph [ref=e25586]: As others said, "write a Rust compiler make no mistakes" can only work if you overfit a harness to that single prompt. Nobody is going to do that.
                            - paragraph [ref=e25587]: So the part you mentioned about the knowledge you accumulated around how to know that "trade-offs between implementations" and "idempotency to prevent double-charges" is just moving to the domain of the english language and tokenizers. One could argue here that this is far more interesting as it requires you to explore deeper into how we communicate and describe the world around us. Reminds me of physics and math.
