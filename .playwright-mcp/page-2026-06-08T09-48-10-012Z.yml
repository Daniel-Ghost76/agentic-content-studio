                        - generic [ref=e19651]:
                          - generic [ref=e19652]:
                            - text: "Maybe denial is a river in Egypt, but I (most of the time) believe that the glass is half full and we will need MORE humans as LLMs gain in ability. My thesis:"
                            - paragraph [ref=e19653]: 1. most jobs are created by small to medium size enterprise
                            - paragraph [ref=e19654]: 2. the throttle for new SMEs has been people, money and ideas, in that order
                            - paragraph [ref=e19655]: 3. with LLMs being a force multiplier, fewer technical people are needed but some people still ARE needed
                            - paragraph [ref=e19656]: 4. with less throttling, MORE SMEs will be created with more jobs - they will be able to do more, faster, but still need some human oversight.
                            - paragraph [ref=e19657]: Also, what is the point of software if it is not to serve human needs?
                            - paragraph [ref=e19658]: Also, in open source, community building and tending is a very human enterprise that will not be replaced by bots any time soon. So, as coding becomes commoditised, perhaps the soft skills backed by technical knowledge will be the complementary skill that increases in value.
                            - paragraph [ref=e19659]: Or, maybe it's time for me to become an itinerant folk musician.
