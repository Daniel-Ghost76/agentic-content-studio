                        - generic [ref=e25699]:
                          - generic [ref=e25700]:
                            - text: "> Of course, I'm still employable because someone has to review the code and steer the robot. But I'm just another off-the-shelf engineer now. I have no domain expertise that another Sr. engineer steering an LLM cannot match. All my finance and payment domain expertise, all the debugging intuition and distributed system knowledge earned through hours of sweat and tears, is now promptable."
                            - paragraph [ref=e25701]: Ownership and responsibility are the new currency for the engineering staff. Willingness to implement these tools and then own the consequences of their use is what leadership is looking for. They want their cake while they eat cake, and they will keep those around who enable something approaching that experience. Owning the side effects of LLM use is more challenging than our own natural output because of the radical volume increase and unfamiliarity with low level details. However, I argue it is still possible. It has always been significantly more expedient to poke holes in someone (something) else's work than it is to perform that same work. And, the executives know this. They leverage this capability too.
                            - paragraph [ref=e25702]: The relationship between the business and the development team has been tenuous at best. I've rarely seen a technology team that was properly subservient to the business that ultimately signed their paychecks. I every case I have personally experienced, it is was like a hostage situation where the business owners are in constant terror of the technology people screwing them over in some infinitely nuanced way they or their lawyers could never understand. Many business owners are looking at this technology as a way out of the hostage situation. They noticed a window that was left unlocked. They are going for it right now. Whether or not they will succeed in their escape is a separate matter. Whether or not them being held hostage was justified is also a separate matter. It really helps to keep these things in their own lanes.
                          - paragraph [ref=e25704]:
