                            - text: "LLMs routinely fail at our business specifics: Local tax regulations, particularities of the accounting process, specifics of our ledger implementations."
                            - paragraph [ref=e11273]: This is domain expertise - software engineers are not needed for that. Ofc often senior sws are expert in it, but they aren't necessary.
                            - paragraph [ref=e11274]: Traditionally its been useful for frictionless production to have engineers to be able to do maybe 90% of their work without consulting the business experts but this is the whole crux of the moment TFA discusses - "tradition" is over.
                            - paragraph [ref=e11275]: In this new world its now the job of a senior engineer not to have this domain expertise themselves, but to know how to ensure the agents have it, or can acquire it and it be verifiably correct.
                            - paragraph [ref=e11276]: Senior engineers who hang on to the idea that their advanced business domain expertise makes them safe will soon be as dead in the water as juniors who haven't pivoted.
