                        - generic [ref=e12329]:
                          - generic [ref=e12330]:
                            - text: "> But as always, further working on it proved extremely difficult, as it always tried to go back to making generic stuff, ignoring the details you give it."
                            - paragraph [ref=e12331]: It's like any LLM, it's not a tool for if you know exactly what you want with all these knobs and fine grained controls.
                            - paragraph [ref=e12332]: "> The most interesting result I had was actually when I managed to get it off rails, a bug more or less. I asked it to mix two very different genres together, and it made something unsettling in a way I don't remember hearing before."
                            - paragraph [ref=e12333]: I don't think that's a bug or unexpected, it's what AI is good for. I do these (very) old Blues covers of modern songs and it's terrific at that sort of conversion thing.
                          - paragraph [ref=e12335]:
