                        - generic [ref=e14987]:
                          - generic [ref=e14988]:
                            - text: "> It's a pretty high moat getting into stuff like simulation software"
                            - paragraph [ref=e14989]: I'm currently working on a simulation/game about space and orbital mechanics. I have a lot of software experience, I know how to build large projects and architect my code, and I know how to to test the end result to ensure I'm getting what I want. But I also don't have a strong math or physics background. In my experience, Claude (Opus 4.6+) has had no issues writing any simulation or game related math code. And the key thing is, I don't need to have a PhD in astrophysics to verify interactively and visually that everything is working as I expect to. I just have an interest in space, and a basic understanding of the physics involved.
                            - paragraph [ref=e14990]: "> it's often applied mathematicians and physicists turned devs that work on this stuff."
                            - paragraph [ref=e14991]: It's true that this has been the case, but I also would not have been able to implement what I'm doing now without these models (at least without dedicated a huge amount of time on learning all of the physics and math). So I think this domain specific knowledge is becoming less of a moat than people realize. At least that's my perspective on the specific area I'm working on, but I don't have a hard time believing it extends to other domains, provided there is ample information about them online to have trained on.
