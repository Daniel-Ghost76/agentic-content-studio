                        - generic [ref=e27075]:
                          - generic [ref=e27076]: So instead of a programmer, you become a software designer. I recently came across the idea of building fantasy for the player (in context of games), but now that I think more about it. Onlyfans, is just that. Advertising, Beauty products, novels, games, TV shows, and so on. You're really just creating / selling a fantasy for vast majority of people. Most people will never lose that 30 lbs, but you can sell them all kinds of products to fuel the fantasy of them losing that weight, being beautiful, rich, healthy and so on. So an LLM replacing the need for you to write every piece of code, is actually kind of freeing. You as a a former programmer, should embrace your new creative role. Writing code, at least for me was always slow and tedious. I just want to be able to express the ideas I have, so LLMs just make it possible to build things I never could otherwise.
