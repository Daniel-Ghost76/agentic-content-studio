                              - /url: javascript:void(0)
                        - generic [ref=e9349]:
                          - generic [ref=e9350]:
                            - text: "> [There is plenty of data to support the claim that AI continues to improve, even exponentially.]("
                            - link "https://epoch.ai/trends" [ref=e9351] [cursor=pointer]:
                              - /url: https://epoch.ai/trends
                            - text: )
                            - paragraph [ref=e9352]:
                              - text: "This doesn't look at all exponential to me:"
                              - link "https://epoch.ai/benchmarks?view=graph&tab=eci" [ref=e9353] [cursor=pointer]:
                                - /url: https://epoch.ai/benchmarks?view=graph&tab=eci
                              - text: . OpenAI models went from 137 ECI to 159 ECI over about a year and a half, and the trends are similar for Anthropic and Google. These things have never been exponential.
                            - paragraph [ref=e9354]: "> The models optimise for solving the benchmark and we create new benchmarks to assess broader intelligence. As models converge on 100%, progress obviously slows."
                            - paragraph [ref=e9355]:
                              - text: "We are nowhere near 100% on important benchmarks like hallucinations:"
                              - link "https://artificialanalysis.ai/evaluations/omniscience?model-..." [ref=e9356] [cursor=pointer]:
                                - /url: https://artificialanalysis.ai/evaluations/omniscience?model-filters=frontier-model&models=gemini-3-1-pro-preview%2Cgemini-3-5-flash%2Cgemini-3-5-flash-medium%2Cgemini-3-pro%2Cgemini-3-flash-reasoning%2Cgemini-3-pro-low%2Cgemini-3-5-flash-minimal%2Cgemini-3-flash%2Cgemini-2-5-pro%2Cgemini-3-1-flash-lite-preview%2Cgemini-2-5-flash-reasoning%2Cgemini-2-5-flash-preview-09-2025-reasoning%2Cgemini-2-5-flash-preview-09-2025%2Cgemini-2-5-flash%2Cgemini-2-0-flash%2Cgemini-2-5-flash-lite-preview-09-2025%2Cgemini-2-5-flash-lite-reasoning%2Cgemini-2-5-flash-lite-preview-09-2025-reasoning%2Cgemini-2-5-flash-lite
                            - paragraph [ref=e9357]: ...also, progress isn't improving with model releases.
                            - paragraph [ref=e9358]: "---"
                            - paragraph [ref=e9359]: We're running out of money. While we don't know how much it cost to train things like Claude, most (all?) industry reports indicate that a significant gain in function (2x) would require an exponential amount of resources (20x). No one's yet been able to convince investors that's worth it.
                            - paragraph [ref=e9360]:
                              - text: "Also, we're running out of data:"
                              - link "https://epoch.ai/publications/will-we-run-out-of-data-limits..." [ref=e9361] [cursor=pointer]:
                                - /url: https://epoch.ai/publications/will-we-run-out-of-data-limits-of-llm-scaling-based-on-human-generated-data
                              - text: .
                            - paragraph [ref=e9362]:
                              - text: "Also, we're running out of of low hanging fruit: \"We find that the level of compute needed to achieve a given level of performance has halved roughly every 8 months, with a 95% confidence interval of 5 to 14 months. This represents extremely rapid progress, outpacing algorithmic progress in many other fields of computing and the 2-year doubling time of Moore’s Law that characterizes improvements in computing hardware (see Figure 2).\" ("
                              - link "https://epoch.ai/publications/algorithmic-progress-in-langua..." [ref=e9363] [cursor=pointer]:
                                - /url: https://epoch.ai/publications/algorithmic-progress-in-language-models
                              - text: ). Maybe you think we'll continue along this breakneck pace, but again no investor thinks that, which is why prices are going up (investment is drying up).
                            - paragraph [ref=e9364]:
                              - text: "Also we're running out of compute. Data center projects are stalling. Some of this is spiking energy prices, some of this is politics, much of this is grid constraints and supply chain problems:"
                              - link "https://tech-insider.org/us-ai-data-center-delays-cancellati..." [ref=e9365] [cursor=pointer]:
                                - /url: https://tech-insider.org/us-ai-data-center-delays-cancellations-7gw-capacity-crisis-2026/
                              - text: .
                            - paragraph [ref=e9366]: "---"
                            - paragraph [ref=e9367]: Finally, and perhaps worst of all, despite unprecedented investment data on the productivity gains is mixed. This is the biggest difference from other technological leaps like electricity, the industrial revolution, literally fire, etc. Those things were immediately, undeniably more productive. AI is not like that. You're not seeing an AI Microsoft, an AI Salesforce, an AI Oracle, an AI SAP, etc. You can argue that their advantages are structural, but there are no successful AI-powered alternative products (no AI Office, no AI ERP, no AI database, etc).
                          - paragraph [ref=e9369]:
                            - link "reply" [ref=e9372] [cursor=pointer]:
                              - /url: reply?id=48443162&goto=item%3Fid%3D48434312%2348443162
