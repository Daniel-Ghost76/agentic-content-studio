            - row "upvote verandaguy 20 hours ago | | | | [–] This question has been easily answered by many companies. You, the IC, the developer prompting the code extruder, are ultimately responsible for its outputted code and its behaviour. You may feel pressured to push out thousands of lines of code a day. You may see those thousands of lines refactored several times over the lifespan of a merge request. You may be asked to do this continue this in the long term with all the mental fatigue that entails. When it's too much for you to sustainably deal with and you turn to using LLMs to review the code, that will still, presumably, fall on you at the end of the day. The output is your responsibility. reply" [ref=e7705]:
