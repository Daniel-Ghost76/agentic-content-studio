                        - generic [ref=e24580]:
                          - generic [ref=e24581]:
                            - text: "I think this experience is universal. The answer is the same as always has been - develop skills that are becoming most important. Right now that is (at least from what I can see): - Data analysis, data pipelines, models, etc. - Tacit business knowledge - architecture and design patterns (always has been, but now the scale os larger so this is even more important)"
                            - paragraph [ref=e24582]: It's harsh but nobody cares if a model or a human made a system.
                            - paragraph [ref=e24583]: The "good" bits are that now automating anything and providing value from software is much easier. If I have an idea or a nitpick somewhere, I can just do it, up to a limit (which is quickly rising).
                            - paragraph [ref=e24584]: I have always been a generalist and generally interested in a very wide array of things, and this period has been the most exciting in my engineering career (13y now). Learning about anything is so frictionless, looking back at my first learning experience - picking up a fat C++ book and spending days/weeks debugging, while I can romanticize that, I would never go back.
                            - paragraph [ref=e24585]: I can also now write software solo or with an extremely small team at a huge scale in comparison, and that is super exciting.
                            - paragraph [ref=e24586]: A lot of skills that took sleepless nights to acquire, they are "gone", but I still don't regret anything or wouldn't go back. Their "usefulness" has degraded, true, but this has always been the case with engineering.
                            - paragraph [ref=e24587]: We are now able to spend much more time thinking about utility rather than low level implementation and imo that's great.
                            - paragraph [ref=e24588]: We have many challenges ahead of us, and there are seriously bad things, the biggest one I have experienced is the hours are increasing and mental load is vastly increasing as well. As capacity, speed and leverage increases, so do expectations and hours, and that is probably a social problem.
                            - paragraph [ref=e24589]: Sorry for the unstructured stream of thoughts, and this is just an opinion (quite an unpopular one I believe), I hope your distress decays away for a new excitement and new opportunities.
                            - paragraph [ref=e24590]: Thanks for the article .
